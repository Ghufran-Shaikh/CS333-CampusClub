<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Hub - Club Activities</title>
    <style>
      /* Your original style remains here */
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f4f4f4;
      }
      
      h1 {
        text-align: center;
        padding: 20px;
        background-color: #007bff;
        color: white;
      }

      .activity-list {
        margin: 20px;
        display: flex;
        flex-wrap: wrap;
        justify-content: space-around;
      }

      .activity-card {
        background-color: white;
        border-radius: 8px;
        padding: 20px;
        margin: 10px;
        width: 250px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }

      .activity-card h2 {
        margin: 0;
        font-size: 18px;
      }

      .activity-card .subdued-text {
        color: #777;
        font-size: 14px;
        margin: 5px 0;
      }

      .filters {
        text-align: center;
        margin-bottom: 20px;
      }

      .filters input, .filters button {
        padding: 8px 12px;
        margin: 0 5px;
        font-size: 16px;
      }

      .pagination {
        text-align: center;
        margin-top: 20px;
      }

      .pagination button {
        padding: 10px;
        font-size: 16px;
        margin: 0 5px;
      }

      #detail {
        margin-top: 40px;
        padding: 20px;
        background-color: white;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>

    <h1>Campus Hub - Club Activities</h1>

    <div class="filters">
      <input type="text" placeholder="Search club activities..." />
      <button>Filter</button>
      <button>Sort</button>
    </div>

    <div class="activity-list">
      <!-- Activities will be populated dynamically here -->
    </div>

    <div class="pagination">
      <button onclick="prevPage()">Prev</button>
      <span>Page 1 of 3</span>
      <button onclick="nextPage()">Next</button>
    </div>

    <div id="detail">
      <!-- Activity details will be shown here -->
    </div>

    <script src="script.js"></script>
  </body>
</html>
