<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Hub - Club Activities</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

  <header>
    <h1>Campus Hub - Club Activities</h1>
  </header>

  <main>

    <!-- Search and Filter -->
    <section class="filters">
      <input type="text" id="searchInput" placeholder="Search club activities..." />
      <button id="sortTitleBtn">Sort by Title</button>
      <button id="sortDateBtn">Sort by Date</button>
    </section>

    <!-- Activity List -->
    <section class="activity-list" id="activityList"></section>

    <!-- Pagination -->
    <section class="pagination">
      <button id="prevBtn">Prev</button>
      <span id="pageInfo"></span>
      <button id="nextBtn">Next</button>
    </section>

    <!-- Creation Form -->
    <section id="create">
      <h2>Add New Club Activity</h2>
      <form id="activityForm">
        <div class="form-group">
          <label>Club Name *</label>
          <input type="text" id="clubName" required />
          <small class="error" id="clubNameError"></small>
        </div>
        <div class="form-group">
          <label>Event Title *</label>
          <input type="text" id="eventTitle" required />
          <small class="error" id="eventTitleError"></small>
        </div>
        <div class="form-group">
          <label>Date *</label>
          <input type="date" id="eventDate" required />
          <small class="error" id="eventDateError"></small>
        </div>
        <div class="form-group">
          <label>Time *</label>
          <input type="time" id="eventTime" required />
          <small class="error" id="eventTimeError"></small>
        </div>
        <div class="form-group">
          <label>Location *</label>
          <input type="text" id="eventLocation" required />
          <small class="error" id="eventLocationError"></small>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="eventDescription" rows="4"></textarea>
        </div>
        <div class="form-buttons">
          <button type="submit">Submit</button>
          <button type="reset">Cancel</button>
        </div>
      </form>
    </section>

    <!-- Detail Section -->
    <section id="detail" class="detail-section" style="display:none;">
      <h2 id="detailTitle">Club Activity Details</h2>
      <img id="detailImage" style="width:100%;max-height:300px;object-fit:cover;border-radius:10px;">
      <p><strong>Club:</strong> <span id="detailClub"></span></p>
      <p><strong>Date & Time:</strong> <span id="detailDateTime"></span></p>
      <p><strong>Location:</strong> <span id="detailLocation"></span></p>
      <p><strong>Description:</strong> <span id="detailDescription"></span></p>
      <button id="backBtn">← Back to listing</button>
    </section>

  </main>

</body>
</html>
