<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Activity Manager</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    .filters {
      margin-bottom: 20px;
    }

    .activity-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .activity-card {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 15px;
      background-color: #f9f9f9;
    }

    .activity-card h2 {
      margin-top: 0;
    }

    .subdued-text {
      color: gray;
      font-size: 0.9em;
      margin-bottom: 10px;
    }

    .card-buttons {
      display: flex;
      gap: 10px;
    }

    .card-buttons button {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background-color: #007bff;
      color: white;
    }

    .card-buttons button:hover {
      opacity: 0.8;
    }

    .pagination {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    form {
      margin-top: 40px;
      border-top: 1px solid #ccc;
      padding-top: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }

    .form-buttons {
      display: flex;
      gap: 10px;
    }

    .form-buttons button {
      padding: 8px 16px;
    }
  </style>
</head>
<body>

  <h1>Activity Manager</h1>

  <div class="filters">
    <input type="text" placeholder="Search by title or description..." />
  </div>

  <section class="activity-list"></section>

  <div class="pagination"></div>

  <form id="activity-form">
    <div class="form-group">
      <label>Club Name *</label>
      <input type="text" name="club" required />
    </div>
    <div class="form-group">
      <label>Event Title *</label>
      <input type="text" name="title" required />
    </div>
    <div class="form-group">
      <label>Date *</label>
      <input type="date" name="date" required />
    </div>
    <div class="form-group">
      <label>Time *</label>
      <input type="time" name="time" required />
    </div>
    <div class="form-group">
      <label>Location *</label>
      <input type="text" name="location" required />
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea rows="4" name="description"></textarea>
    </div>
    <div class="form-buttons">
      <button type="submit">Submit</button>
      <button type="reset">Cancel</button>
    </div>
  </form>

  <!-- Link to the external JavaScript file -->
  <script src="script.js"></script>
</body>
</html>
