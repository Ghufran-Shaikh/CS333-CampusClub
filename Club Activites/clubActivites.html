<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Hub - Club Activities</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .filters {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .filters input,
    .filters button {
      padding: 10px;
      font-size: 16px;
    }

    .activity-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .activity-card {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 15px;
      background-color: #f9f9f9;
    }

    .activity-card h2 {
      margin: 0;
      font-size: 20px;
    }

    .subdued-text {
      font-size: 14px;
      color: #888;
    }

    .pagination {
      text-align: center;
      margin-top: 20px;
    }

    .pagination button {
      padding: 10px;
      font-size: 16px;
    }

    .button {
      padding: 10px 15px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .button:hover {
      background-color: #0056b3;
    }

    #create {
      margin-top: 40px;
    }

    #create form .form-group {
      margin-bottom: 15px;
    }

    #create form .form-group label {
      font-weight: bold;
    }

    #create form .form-group input,
    #create form .form-group textarea {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    #create form .form-buttons button {
      padding: 10px 15px;
      margin-right: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .detail-section {
      margin-top: 40px;
    }

    .detail-section h2 {
      font-size: 24px;
    }

    .card-buttons {
      margin-top: 20px;
    }

    .card-buttons button {
      padding: 10px 15px;
      margin-right: 10px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <header>
    <h1>Campus Hub - Club Activities</h1>
  </header>

  <main>
    <section class="filters">
      <input type="text" placeholder="Search club activities..." />
      <button>Filter</button>
      <button>Sort</button>
    </section>

    <section>
      <a href="#create" class="button">+ Add New Activity</a>
    </section>

    <section class="activity-list">
      <!-- Activities will be populated dynamically here -->
    </section>

    <section class="pagination">
      <button>Prev</button>
      <span>Page 1 of 3</span>
      <button>Next</button>
    </section>

    <section id="create">
      <h2>Add New Club Activity</h2>
      <form>
        <div class="form-group">
          <label>Club Name *</label>
          <input type="text" required />
        </div>
        <div class="form-group">
          <label>Event Title *</label>
          <input type="text" required />
        </div>
        <div class="form-group">
          <label>Date *</label>
          <input type="date" required />
        </div>
        <div class="form-group">
          <label>Time *</label>
          <input type="time" required />
        </div>
        <div class="form-group">
          <label>Location *</label>
          <input type="text" required />
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea rows="4"></textarea>
        </div>
        <div class="form-buttons">
          <button type="submit">Submit</button>
          <button type="reset">Cancel</button>
        </div>
      </form>
    </section>

    <section id="detail" class="detail-section">
      <!-- Details of each club activity will be displayed here -->
    </section>

  </main>
  
  <script src="script.js"></script>

</body>
</html>
