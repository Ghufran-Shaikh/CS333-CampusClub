    <div class=" mt-8">
      <h1 id="group-title" class="text-5xl font-extrabold text-gray-900 mb-2 ml-4 text-left dark:text-white"></h1>
      <div id="group-meta" class="flex text-left ml-6 gap-4 mb-4">
        <span id="group-subject" class="font-semibold text-lg dark:text-white"></span>
        <span id="group-coverage" class="font-semibold text-lg dark:text-white"></span>
      </div>
      <div class="flex flex-col md:flex-row gap-6 right-4">
        <div class="flex-1">
          <div id="group-details" class="ml-5  rounded-lg  mb-6  text-gray-900 text-lg  dark:text-white"></div>
        </div>
        <div class="w-full md:w-80 flex flex-col gap-6 ">
          <div id="group-side-info" class="p-4 mr-4 bg-white rounded-lg shadow border border-gray-200 text-gray-900 mb-0 dark:bg-gray-800 dark:border-gray-700 dark:text-white">
            <h3 class="text-xl font-bold mb-2 text-center">Group Info</h3>
            <div class="p-4 dark:bg-gray-600 dark:text-white rounded-xl bg-gray-100 text-gray-900">
              <div class='mb-2'><span class="font-semibold">Location:</span> <span id="side-location"></span></div>
              <div class='mb-2'><span class="font-semibold">Date:</span> <span id="side-date"></span> </div>
              <div class="mb-2"><span class="font-semibold">Time:</span> <span id="side-time"></span></div>
              <div class='mb-2'><span class="font-semibold">Repetition:</span> <span id="side-repetition"></span></div>
              <div class='mb-2'><span class="font-semibold">Seats:</span> <span id="side-seats"></span></div>
            </div>
          </div>
          <div id="group-members" class="p-4 mr-4 bg-white rounded-lg shadow border border-gray-200 text-gray-900 dark:bg-gray-800 dark:border-gray-700 dark:text-white">
            <h3 class="text-xl font-bold mb-2 text-center">Members</h3>
            <div class="flex items-center justify-baseline p-4 dark:bg-gray-600 dark:text-white rounded-xl bg-gray-100 text-gray-900 ">
              <ul id="members-list" class="list-disc p-2"></ul>
            </div>
          </div>
        </div>
      </div>
      <div id="group-comments" class="w-full p-6 bg-white shadow border border-gray-200 mt-6 dark:bg-gray-800 dark:border-gray-700 dark:text-white">
        <h3 class="text-2xl font-bold mb-2 text-gray-900 dark:text-white">Comments</h3>
        <form id="comment-form" class="mb-4">
          <div class="flex mb-2">
            <span class="mr-2 text-gray-700 dark:text-gray-300">Rating:</span>
            <div id="star-rating" class="flex text-yellow-400 dark:text-yellow-500"></div>
          </div>
          <textarea id="comment-input" rows="3" class="block w-full p-4 mb-2 text-sm text-gray-900  rounded-xl bg-gray-100 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Write a comment..."></textarea>
          <div class="flex justify-center">
            <button type="submit" class="px-4 py-2 bg-blue-700 text-white rounded hover:bg-blue-800 dark:bg-blue-600 dark:hover:bg-blue-700">Post</button>
          </div>
        </form>
        <div id="comments-list"></div>
      </div>

            <button type="button" data-tooltip-target="tooltip-share" data-tooltip-placement="top" class="flex justify-center items-center w-[52px] h-[52px] text-gray-500 hover:text-gray-900 bg-white rounded-full border border-gray-200 dark:border-gray-600 shadow-xs dark:hover:text-white dark:text-gray-400 hover:bg-gray-50 dark:bg-gray-700 dark:hover:bg-gray-600 focus:ring-4 focus:ring-gray-300 focus:outline-none dark:focus:ring-gray-400">

                <div class="tooltip-arrow" data-popper-arrow></div>
            </div>
            <button type="button" data-tooltip-target="tooltip-download" data-tooltip-placement="top" class="flex justify-center items-center w-[52px] h-[52px] text-gray-500 hover:text-gray-900 bg-white rounded-full border border-gray-200 dark:border-gray-600 shadow-xs dark:hover:text-white dark:text-gray-400 hover:bg-gray-50 dark:bg-gray-700 dark:hover:bg-gray-600 focus:ring-4 focus:ring-gray-300 focus:outline-none dark:focus:ring-gray-400">
