<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Clubs - IT Courses Notes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f8f9fa;
    }
  </style>
</head>

<body class="bg-gray-100">

  <!-- Header -->
  <nav class="bg-blue-950 shadow-lg">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex justify-between h-16 items-center">
            <div>
                <img src="/university-of-bahrain-Logo-Vector.svg-.png" alt="Campus Club Logo" class="h-10">
            </div>
            <div class="flex space-x-4">
                <a href="/index.html" class="text-white hover:text-blue-500 px-3 py-2 rounded-md text-sm font-medium">Home</a>
                <a href="/Calnder-moduel/calander.html" class="text-white hover:text-blue-500 px-3 py-2 rounded-md text-sm font-medium">Event Calendar</a>
                <a href="/study-group-finder/study-group-finder.html" class="text-white hover:text-blue-500 px-3 py-2 rounded-md text-sm font-medium">Study Group Finder</a>
                <a href="/CourseReviews/CourseReviews.html" class="text-white hover:text-blue-500 px-3 py-2 rounded-md text-sm font-medium">Course Reviews</a>
                <a href="/Course Notes/CourseNotes.html" class="text-white hover:text-blue-500 px-3 py-2 rounded-md text-sm font-medium">Course Note</a>
                <a href="/Club Activites/clubActivites.html" class="text-white hover:text-blue-500 px-3 py-2 rounded-md text-sm font-medium">Clubs Activities</a>
            </div>
            <div>
                <a href="/Course Notes/profile.html" class="text-white hover:text-blue-500 px-3 py-2 rounded-md text-sm font-medium">
                    <i class="fas fa-user mr-1"></i> Profile
                </a>
            </div>
        </div>
    </div>
</nav>

  <main class="max-w-7xl mx-auto px-4 py-8">
     <!-- Search and Filter Section -->
     <section class="mb-8">
        <div class="bg-orange-400 rounded-3xl shadow p-6">
            <div class="flex gap-4">
                <!-- Search Bar -->
                <div class="relative flex-1">
                    <input type="text" id="search-bar" placeholder="Search courses..." 
                        class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                </div>
                
                <!-- Filter notes -->
                <div class="flex space-x-2">
                    <select id="filter-dropdown" class="px-3 py-2 pr-4 border border-gray-300 rounded-2xl bg-white text-sm">
                        <option value="">All</option>
                        <option value="top-rated">Top Rated</option>
                        <option value="recently-added">Recently Added</option>
                        <option value="a-z">A-Z</option>
                        <option value="z-a">Z-A</option>
                    </select>
                </div>

                <!-- Add note button -->
                <button class="bg-orange-600 hover:bg-orange-700 text-white px-4 py-2 pr-4 rounded-2xl text-sm font-medium">
                    <i class="fas fa-plus mr-1"></i> Add Note
                </button>
            </div>
        </div>
    </section>

    <!-- Notes -->
    <section class="mb-12">
      <h2 class="text-2xl font-bold text-blue-950 mb-6 border-b pb-2">Science College Notes</h2>
      
      <div id="it-notes-container" class="grid grid-cols-1 gap-6">
        <!-- Notes will be here -->
      </div>
    </section>

    <!-- Pagination -->
    <div class="flex justify-center">
      <nav aria-label="Page navigation" class="flex items-center space-x-2">
        <button id="prev-page" class="px-4 py-2 rounded-md bg-gray-200 text-gray-700 hover:bg-gray-300 disabled:opacity-50">
          <i class="fas fa-chevron-left"></i> Previous
        </button>
        
        <div id="page-numbers" class="flex space-x-1">
          <!-- Page numbers will be here -->
        </div>
        
        <button id="next-page" class="px-4 py-2 rounded-md bg-gray-200 text-gray-700 hover:bg-gray-300 disabled:opacity-50">
          Next <i class="fas fa-chevron-right"></i>
        </button>
      </nav>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-blue-950 border-t mt-8 py-6">
    <div class="container mx-auto px-4">
      <div class="flex flex-col md:flex-row justify-between items-center">
        <div class="text-white hover:text-blue-500 mb-4 md:mb-0">&copy; 2025 ITCS333 Project - Campus Club</div>
        <div class="flex flex-wrap justify-center gap-4">
          <a href="#" class="text-white hover:text-blue-500 transition duration-300">Club Policy</a>
          <a href="#" class="text-white hover:text-blue-500 transition duration-300">Terms of Service</a>
          <a href="#" class="text-white hover:text-blue-500 transition duration-300">Contact Us</a>
          <a href="#" class="text-white hover:text-blue-500 transition duration-300">About</a>
          <a href="#" class="text-white hover:text-blue-500 transition duration-300">Help Center</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="/Course Notes/CourseNotes.js"></script>

</body>
</html>
