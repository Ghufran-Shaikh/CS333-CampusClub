<!DOCTYPE html>
<html>
<head>
    <title>Event Calnder</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>     
            <!---Calander title--->    
    <div class="text-center text-4xl mt-4">
        <H1 class="font-bold text-blue-800 ">Event Calander </H1>
    </div>
    
            <!---Calander content--->   
    <div class="bg-orange-400 p-4 m-2">
            <!---Calander days--->   
        <div class="grid grid-cols-7 gap-2">
            <div class="text-center font-semibold text-black ">Sun</div>
            <div class="text-center font-semibold text-black">Mon</div>
            <div class="text-center font-semibold text-black">Tue</div>
            <div class="text-center font-semibold text-black">Wed</div>
            <div class="text-center font-semibold text-black">Thu</div>
            <div class="text-center font-semibold text-black">Fri</div>
            <div class="text-center font-semibold text-black">Sat</div>
        </div>
        </div>
        <div class="grid grid-cols-7 p-4 m-2 gap-0 mt-2">
               <!---Calander week 1--->   
            <div class="border border-gray-400 text-center bg-white p-2">1</div>
            <div class="border border-gray-400 text-center bg-white p-2">2</div>
            <div class="border border-gray-400 text-center bg-white p-2">3</div>
            <div class="border border-gray-400 text-center bg-white p-2">4</div>
            <div class="border border-gray-400 text-center bg-white p-2">5</div>
            <div class="border border-gray-400 text-center bg-white p-2">6</div>
            <div class="border border-gray-400 text-center bg-white p-2">7</div>
               <!---Calander week 2---> 
            <div class="border border-gray-400 text-center bg-white p-2">8</div>
            <div class="border border-gray-400 text-center bg-white p-2">9</div>
            <div class="border border-gray-400 text-center bg-white p-2">10</div>
            <div class="border border-gray-400 text-center bg-white p-2">11</div>
            <div class="border border-gray-400 text-center bg-white p-2">12</div>
            <div class="border border-gray-400 text-center bg-white p-2">13</div>
            <div class="border border-gray-400 text-center bg-white p-2">14</div>
               <!---Calander week 3---> 
            <div class="border border-gray-400 text-center bg-white p-2">15</div>
            <div class="border border-gray-400 text-center bg-white p-2">16</div>
            <div class="border border-gray-400 text-center bg-white p-2">17</div>
            <div class="border border-gray-400 text-center bg-white p-2">18</div>
            <div class="border border-gray-400 text-center bg-white p-2">19</div>
            <div class="border border-gray-400 text-center bg-white p-2">20</div>
            <div class="border border-gray-400 text-center bg-white p-2">21</div>
               <!---Calander week 4---> 
            <div class="border border-gray-400 text-center bg-white p-2">22</div>
            <div class="border border-gray-400 text-center bg-white p-2">23</div>
            <div class="border border-gray-400 text-center bg-white p-2">24</div>
            <div class="border border-gray-400 text-center bg-white p-2">25</div>
            <div class="border border-gray-400 text-center bg-white p-2">26</div>
            <div class="border border-gray-400 text-center bg-white p-2">27</div>
            <div class="border border-gray-400 text-center bg-white p-2">28</div>
              <!---Calander week 4.1---> 
            <div class="border border-gray-400 text-center bg-white p-2">29</div>
            <div class="border border-gray-400 text-center bg-white p-2">30</div>
            <div class="border border-gray-400 text-center bg-white p-2">31</div>
              
    </div>
           <!---Calander Add/edit Event Buttton---> 
    <div class="text-center mt-4">
        <button class="bg-blue-800 text-white font-bold py-2 px-4 rounded">Add Event</button>
        <button class="bg-blue-800 text-white font-bold py-2 px-4 rounded">Edit Event</button>

    </div>

</body>
</html>
