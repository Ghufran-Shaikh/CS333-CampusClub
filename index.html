<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Reviews</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    [id^="modal-"]:target {
      display: flex;
    }
    #add-review:target {
      display: flex;
    }
  </style>
  

</head>
<body class="bg-gray-50 text-gray-800">
  <header class="bg-blue-800 p-4 text-white shadow-md">
    <div class="flex items-center gap-4">
     
      <h1 class="text-2xl font-bold">Course Reviews</h1>
    </div>
  </header>

  <main class="p-6 space-y-6">

    <!-- Search Bar -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
      <input type="text" placeholder="  🔍︎ Search by course..." class="w-full md:w-1/2 p-2 border rounded-xl" />
      <div class="flex gap-2">


    <!--Filter Options-->
    <select name="department" class="p-2 border rounded-xl">

          <option>All Departments</option>
            <optgroup label="College of Information Technology">
              <option value="Computer Science">Computer Science</option>
              <option value="Computer Engineering">Computer Engineering</option>
              <option value="Information System">Information System</option>

            </optgroup>
            <optgroup label=" College of Science">
              <option value="Physics">Physics</option>
              <option value="Math">Math</option>
              <option value="Chemistry">Chemistry</option>
            </optgroup>
        </select>


    <!--Sorting controls-->
    <select name="sort" class="p-2 border rounded-xl">

          <option value="" disabled selected>Sort by:</option>
          <option>Newest</option>
          <option>Oldest</option>
          <option>Most Liked</option>
        </select>
      </div>
    </div>

    <!-- Add New Review -->

    <!--new review button-->
    <div class="text-right">
      <a href="#add-review" class="bg-blue-800 text-white px-4 py-2 rounded-xl hover:bg-blue-900"> Add Review</a>
    </div>

    <!-- new review details window-->
    <div id="add-review" class="hidden fixed inset-0 bg-black bg-opacity-50 items-start justify-center p-4 z-50">
      <section class="bg-white rounded shadow p-6 w-full max-w-2xl mt-20">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-800">Add New Course Review</h2>
        <form class="space-y-5">
      
          <div>
            <label class="block mb-1 font-medium text-gray-700">Course Title *</label>
            <input type="text" required placeholder="example: DATA STRUCTURE"
              class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
    
          <div>
            <label class="block mb-1 font-medium text-gray-700">Course Code *</label>
            <input type="text" required placeholder="example: ITCS214"
              class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
    
          <div>
            <label class="block mb-1 font-medium text-gray-700">Instructor Name *</label>
            <input type="text" required
              class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
    
          <div>
            <label class="block mb-1 font-medium text-gray-700">Semester</label>
            <select class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
              <option>First Semester</option>
              <option>Second Semester</option>
              <option>Summer Semester</option>
            </select>
          </div>
    
          <div>
            <label class="block mb-1 font-medium text-gray-700">Rating (1–5) *</label>
            <input type="number" required min="1" max="5"
              class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
    
          <div>
            <label class="block mb-1 font-medium text-gray-700">Review *</label>
            <textarea required rows="5"
              class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
          </div>
    
          <div class="flex justify-between items-center pt-4">
            <button type="submit"
              class="bg-blue-800 text-white px-6 py-2 rounded hover:bg-blue-900 transition">Submit</button>
            <a href="#" class="text-blue-800 hover:underline">Cancel</a>
          </div>
    
        </form>
  </section>
</div>


    
     <!--First Review Card-->
    <section class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">



    </section>

    
    <div class="flex justify-center items-center space-x-2 mt-6"></div>

  </main>
  <script src="script.js"></script>
</body>
</html>
