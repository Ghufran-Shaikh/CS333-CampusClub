<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Calendar</title>
    <link rel="icon" type="image/x-icon" href="Calendar-icon.jpeg">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin: 20px auto;
            max-width: 90vw;
            width: 100%;
        }
        .day {
            border: 1px solid #ccc;
            padding: 10px;
            cursor: pointer;
            text-align: center;
            font-size: 0.9rem;
            transition: background-color 0.3s;
        }
        .day:hover {
            background-color: #f0a500; 
        }
        .event-form {
            display: none; 
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .upcoming-events {
            position: fixed;  
            right: 20px;
            top: 100px;
            width: 400px; /* Increased width from 300px to 400px */
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        @media (max-width: 768px) {
            .calendar {
                grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
            }
        }
        @media (max-width: 1024px) {
            .upcoming-events {
                position: static; 
                width: 100%;
                max-height: none;
                margin-top: 20px;
            }
        }
               
        #authModal {
            transition: all 0.3s ease;
        }

        /* أنماط الأزرار */
        button {
            transition: background-color 0.2s ease;
        }

        /* أنماط حقول الإدخال */
        input[type="text"], 
        input[type="password"], 
        input[type="email"],
        input[type="datetime-local"] {
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 8px 12px;
            width: 100%;
            box-sizing: border-box;
        }

        input[type="text"]:focus, 
        input[type="password"]:focus, 
        input[type="email"]:focus,
        input[type="datetime-local"]:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px #bfdbfe;
        }
    </style>
</head>
<body>
<header class="bg-blue-800 fixed top-0 left-0 right-0 z-10 py-4 px-6">
    <nav class="flex justify-between items-center">
        <ul class="flex space-x-6 items-center text-white font-bold">
            <li><a href="../index.html" target="_blank" class="hover:text-orange-500">Home</a></li>
            <li><a href="calander.html" target="_blank" class="hover:text-orange-500">Event Calendar</a></li>
            <li><a href="../study-group-finder/study-group-finder.html" target="_blank" class="hover:text-orange-500">Study Group Finder</a></li>
            <li><a href="../CourseReviews/CourseReviews.html" target="_blank" class="hover:text-orange-500">Course Reviews</a></li>
            <li><a href="../Course Notes/CourseNote.html" target="_blank" class="hover:text-orange-500">Course Note</a></li>
            <li><a href="../Club Activites/clubActivites.html" target="_blank" class="hover:text-orange-500">Clubs Activities</a></li>
        </ul>
        <div id="authButtons" class="text-white">
            
        </div>
    </nav>
</header>
<div id="authModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-20 hidden">
    <div class="bg-white p-6 rounded-lg w-96">
        <h2 class="text-2xl font-bold mb-4" id="authModalTitle">Login</h2>
        <form id="authForm">
            <div id="registerFields" class="hidden">
                <div class="mb-4">
                    <label for="email" class="block mb-1">Email:</label>
                    <input type="email" id="email" class="w-full p-2 border rounded">
                </div>
            </div>
            <div class="mb-4">
                <label for="authUsername" class="block mb-1">Username:</label>
                <input type="text" id="authUsername" class="w-full p-2 border rounded" required>
            </div>
            <div class="mb-4">
                <label for="authPassword" class="block mb-1">Password:</label>
                <input type="password" id="authPassword" class="w-full p-2 border rounded" required>
            </div>
            <div class="flex justify-between">
                <button type="button" id="toggleAuthMode" class="text-blue-600 hover:underline">
                    Switch to Register
                </button>
                <button type="submit" class="bg-blue-800 text-white px-4 py-2 rounded">
                    Submit
                </button>
            </div>
        </form>
    </div>
</div>    
<main class="flex-grow flex flex-col items-center pt-24 px-4">
    <div class="max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <h1 class="text-4xl font-bold text-blue-800 mb-2">Event Calendar</h1>
            <p class="text-gray-600 mb-4">Choose a date to add an event.</p>

            <div class="flex gap-2 mb-4 flex-wrap">
                <select id="monthSelect" class="border border-gray-300 p-2 rounded flex-1 min-w-[120px]"></select>
                <select id="yearSelect" class="border border-gray-300 p-2 rounded flex-1 min-w-[120px]"></select>
                <button id="generateBtn" class="bg-blue-800 text-white font-bold py-2 px-4 rounded">Generate</button>
            </div>

            <div class="calendar" id="calendar"></div>

            <div id="eventForm" class="event-form mt-4">
                <h3 class="font-bold mb-2">Add Event</h3>
                <label for="eventName">Event Name:</label>
                <input type="text" id="eventName" class="w-full p-2 border border-gray-300 rounded mb-2" />
                <label for="eventDateTime">Event Date and Time:</label>
                <input type="datetime-local" id="eventDateTime" class="w-full p-2 border border-gray-300 rounded mb-2" />
                <button id="saveEventBtn" class="bg-blue-800 text-white font-bold py-2 px-4 rounded mt-2">Submit</button>
            </div>
        </div>

        <div class="upcoming-events">
            <h2 class="text-2xl font-bold mb-4">Upcoming Events</h2>
            <input type="text" id="event-search" placeholder="🔍 Search for an event..." class="w-full p-2 border border-gray-300 rounded mb-4" oninput="updateEventList()">
            <div class="flex justify-between mb-4">
                <label for="sortSelect" class="font-bold">Sort By:</label>
                <select id="sortSelect" class="border border-gray-300 p-2 rounded" onchange="updateEventList()">
                    <option value="date">Date</option>
                    <option value="name">Name</option>
                </select>
            </div>
            <ul id="eventList" class="list-disc pl-5"></ul>
        </div>
    </div>
</main>

<footer class="bg-blue-800 text-white py-4 text-center mt-8">
    <div>&copy; 2025 ITCS333 Project</div>
    <div class="flex justify-center gap-4 mt-2">
        <a href="#" class="hover:text-orange-500">Club Policy</a>
        <a href="#" class="hover:text-orange-500">Terms</a>
        <a href="#" class="hover:text-orange-500">Contact</a>
        <a href="#" class="hover:text-orange-500">About</a>
        <a href="#" class="hover:text-orange-500">Help</a>
    </div>
</footer>


<script>
// -------------------- Full JavaScript for Event Calendar  --------------------

// -------------------- JavaScript الكامل لتطبيق التقويم مع المصادقة --------------------

const API_BASE_URL = 'http://yourdomain.com/api'; // تغيير هذا لعنوان API الخاص بك
const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

// حالة التطبيق
let events = [];
let filteredEvents = [];
let editingEventId = null;
let isAuthenticated = false;
let currentUser = null;
let currentPage = 1;
const eventsPerPage = 5;

// تهيئة التطبيق عند تحميل الصفحة
document.addEventListener('DOMContentLoaded', () => {
    populateSelects();
    const today = new Date();
    document.getElementById('monthSelect').value = today.getMonth();
    document.getElementById('yearSelect').value = today.getFullYear();
    generateCalendar(today.getFullYear(), today.getMonth());

    // إعداد معالجي الأحداث
    document.getElementById('saveEventBtn').addEventListener('click', saveEvent);
    document.getElementById('generateBtn').addEventListener('click', () => {
        const year = parseInt(document.getElementById('yearSelect').value);
        const month = parseInt(document.getElementById('monthSelect').value);
        generateCalendar(year, month);
    });

    // إعداد مصادقة
    setupAuthHandlers();
    checkAuthState().then(() => {
        fetchAndDisplayEvents();
    });

    // إعداد البحث والترتيب
    document.getElementById('event-search').addEventListener('input', updateEventList);
    document.getElementById('sortSelect').addEventListener('change', updateEventList);
});

// -------------------- دوال التقويم --------------------

function populateSelects() {
    const monthSelect = document.getElementById('monthSelect');
    const yearSelect = document.getElementById('yearSelect');

    if (monthSelect.options.length === 0) {
        months.forEach((month, index) => {
            const option = document.createElement('option');
            option.value = index;
            option.textContent = month;
            monthSelect.appendChild(option);
        });
    }

    if (yearSelect.options.length === 0) {
        const currentYear = new Date().getFullYear();
        for (let i = currentYear; i <= currentYear + 10; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = i;
            yearSelect.appendChild(option);
        }
    }
}

function generateCalendar(year, month) {
    const calendar = document.getElementById('calendar');
    calendar.innerHTML = '';
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const firstDay = new Date(year, month, 1).getDay();

    // إضافة خلايا فارغة لأيام الأسبوع قبل اليوم الأول من الشهر
    for (let i = 0; i < firstDay; i++) {
        const emptyDay = document.createElement('div');
        emptyDay.classList.add('day', 'bg-gray-100');
        calendar.appendChild(emptyDay);
    }

    for (let day = 1; day <= daysInMonth; day++) {
        const dayElement = document.createElement('div');
        dayElement.classList.add('day');
        dayElement.textContent = day;

        // تسجيل أحداث اليوم إذا وجدت
        const dayEvents = events.filter(event => {
            const eventDate = new Date(`${event.date}T${event.time}`);
            return eventDate.getDate() === day && 
                   eventDate.getMonth() === month && 
                   eventDate.getFullYear() === year;
        });

        if (dayEvents.length > 0) {
            const eventBadge = document.createElement('div');
            eventBadge.classList.add('text-xs', 'text-white', 'bg-blue-600', 'rounded-full', 'w-4', 'h-4', 'flex', 'items-center', 'justify-center', 'ml-auto');
            eventBadge.textContent = dayEvents.length;
            dayElement.appendChild(eventBadge);
        }

        dayElement.addEventListener('click', () => {
            openEventForm(year, month + 1, day);
        });

        calendar.appendChild(dayElement);
    }
}

function openEventForm(year, month, day, event = null) {
    if (!isAuthenticated) {
        showAuthModal(true);
        alert('Please login to add or edit events');
        return;
    }

    const eventForm = document.getElementById('eventForm');
    eventForm.style.display = 'block';
    document.getElementById('eventName').value = event ? event.title : '';
    
    const eventDateTimeInput = document.getElementById('eventDateTime');
    if (event) {
        const eventDate = new Date(`${event.date}T${event.time}`);
        const formattedDate = eventDate.toISOString().slice(0, 16);
        eventDateTimeInput.value = formattedDate;
        editingEventId = event.id;
    } else {
        const formattedDate = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}T00:00`;
        eventDateTimeInput.value = formattedDate;
        editingEventId = null;
    }
}

// -------------------- دوال إدارة الأحداث --------------------

async function fetchAndDisplayEvents() {
    try {
        const token = localStorage.getItem('token');
        const headers = {
            'Content-Type': 'application/json'
        };
        
        if (token) {
            headers['Authorization'] = `Bearer ${token}`;
        }

        const response = await fetch(`${API_BASE_URL}/events.php`, {
            headers: headers
        });
        
        if (!response.ok) {
            throw new Error('Failed to fetch events');
        }
        
        const data = await response.json();
        events = data.data || [];
        updateEventList();
    } catch (error) {
        console.error('Error fetching events:', error);
        events = [];
        updateEventList();
    }
}

async function saveEvent() {
    const eventName = document.getElementById('eventName').value.trim();
    const eventDateTime = document.getElementById('eventDateTime').value;

    if (!eventName) {
        alert('Please enter an event name.');
        return;
    }
    if (!eventDateTime) {
        alert('Please select a date and time for the event.');
        return;
    }

    const [date, time] = eventDateTime.split('T');
    const eventData = {
        title: eventName,
        start_time: `${date} ${time}:00`,
        end_time: `${date} ${time}:00`,
        description: ''
    };

    try {
        const token = localStorage.getItem('token');
        if (!token) {
            throw new Error('Not authenticated');
        }

        let response;
        if (editingEventId) {
            // تحديث الحدث الموجود
            response = await fetch(`${API_BASE_URL}/events.php?id=${editingEventId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(eventData)
            });
        } else {
            // إنشاء حدث جديد
            response = await fetch(`${API_BASE_URL}/events.php`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(eventData)
            });
        }

        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || 'Failed to save event');
        }

        document.getElementById('eventForm').style.display = 'none';
        await fetchAndDisplayEvents();
    } catch (error) {
        console.error('Error saving event:', error);
        alert(`Error: ${error.message}`);
    }
}

async function deleteEvent(id) {
    if (!confirm('Are you sure you want to delete this event?')) {
        return;
    }

    try {
        const token = localStorage.getItem('token');
        if (!token) {
            throw new Error('Not authenticated');
        }

        const response = await fetch(`${API_BASE_URL}/events.php?id=${id}`, {
            method: 'DELETE',
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });

        if (!response.ok) {
            throw new Error('Failed to delete event');
        }

        await fetchAndDisplayEvents();
    } catch (error) {
        console.error('Error deleting event:', error);
        alert('Failed to delete event. Please try again.');
    }
}

function updateEventList() {
    currentPage = 1;
    filterEventsList();
    sortFilteredEvents();
    renderEvents();
}

function filterEventsList() {
    const searchTerm = document.getElementById('event-search').value.toLowerCase();
    filteredEvents = events.filter(event => 
        event.title.toLowerCase().includes(searchTerm) ||
        (event.description && event.description.toLowerCase().includes(searchTerm))
    );
}

function sortFilteredEvents() {
    const sortCriteria = document.getElementById('sortSelect').value;

    filteredEvents.sort((a, b) => {
        if (sortCriteria === 'date') {
            return new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`);
        } else {
            return a.title.localeCompare(b.title);
        }
    });
}

function renderEvents() {
    const eventList = document.getElementById('eventList');
    eventList.innerHTML = '';

    if (filteredEvents.length === 0) {
        const emptyItem = document.createElement('li');
        emptyItem.textContent = 'No events found.';
        eventList.appendChild(emptyItem);
        removePaginationControls();
        return;
    }

    const startIndex = (currentPage - 1) * eventsPerPage;
    const endIndex = Math.min(startIndex + eventsPerPage, filteredEvents.length);
    const eventsToShow = filteredEvents.slice(startIndex, endIndex);

    eventsToShow.forEach(event => {
        const eventItem = document.createElement('li');
        eventItem.classList.add('mb-2', 'pb-2', 'border-b');
        
        const eventDate = new Date(`${event.date}T${event.time}`);
        const eventTime = eventDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        const eventTitle = document.createElement('div');
        eventTitle.classList.add('font-bold');
        eventTitle.textContent = event.title;
        
        const eventDetails = document.createElement('div');
        eventDetails.classList.add('text-sm', 'text-gray-600');
        eventDetails.textContent = `${eventDate.toLocaleDateString()} at ${eventTime}`;
        
        if (event.description) {
            const eventDesc = document.createElement('div');
            eventDesc.classList.add('text-sm', 'mt-1');
            eventDesc.textContent = event.description;
            eventDetails.appendChild(eventDesc);
        }

        eventItem.appendChild(eventTitle);
        eventItem.appendChild(eventDetails);

        if (isAuthenticated && currentUser && (currentUser.role === 'admin' || event.user_id === currentUser.id)) {
            const buttonsContainer = document.createElement('div');
            buttonsContainer.classList.add('mt-2', 'flex', 'gap-2');
            
            const editBtn = document.createElement('button');
            editBtn.textContent = 'Edit';
            editBtn.classList.add('bg-yellow-500', 'text-white', 'px-2', 'py-1', 'rounded', 'text-xs');
            editBtn.addEventListener('click', () => {
                const eventDate = new Date(`${event.date}T${event.time}`);
                openEventForm(
                    eventDate.getFullYear(),
                    eventDate.getMonth() + 1,
                    eventDate.getDate(),
                    event
                );
            });
            
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = 'Delete';
            deleteBtn.classList.add('bg-red-500', 'text-white', 'px-2', 'py-1', 'rounded', 'text-xs');
            deleteBtn.addEventListener('click', () => deleteEvent(event.id));
            
            buttonsContainer.appendChild(editBtn);
            buttonsContainer.appendChild(deleteBtn);
            eventItem.appendChild(buttonsContainer);
        }

        eventList.appendChild(eventItem);
    });

    renderPaginationControls();
}

function renderPaginationControls() {
    removePaginationControls();

    const totalPages = Math.ceil(filteredEvents.length / eventsPerPage);
    if (totalPages <= 1) return;

    const paginationDiv = document.createElement('div');
    paginationDiv.id = 'paginationControls';
    paginationDiv.classList.add('flex', 'justify-center', 'gap-2', 'mt-4');

    // Previous button
    const prevBtn = document.createElement('button');
    prevBtn.textContent = 'Previous';
    prevBtn.disabled = currentPage === 1;
    prevBtn.classList.add('px-3', 'py-1', 'rounded', 'bg-blue-600', 'text-white', 'disabled:opacity-50');
    prevBtn.addEventListener('click', () => {
        if (currentPage > 1) {
            currentPage--;
            renderEvents();
        }
    });
    paginationDiv.appendChild(prevBtn);

    // Page numbers
    const maxVisiblePages = 5;
    let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
    let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);

    if (endPage - startPage + 1 < maxVisiblePages) {
        startPage = Math.max(1, endPage - maxVisiblePages + 1);
    }

    for (let i = startPage; i <= endPage; i++) {
        const pageBtn = document.createElement('button');
        pageBtn.textContent = i;
        pageBtn.classList.add('px-3', 'py-1', 'rounded');
        
        if (i === currentPage) {
            pageBtn.classList.add('bg-blue-800', 'text-white');
        } else {
            pageBtn.classList.add('bg-gray-200', 'hover:bg-gray-300');
            pageBtn.addEventListener('click', () => {
                currentPage = i;
                renderEvents();
            });
        }
        
        paginationDiv.appendChild(pageBtn);
    }

    // Next button
    const nextBtn = document.createElement('button');
    nextBtn.textContent = 'Next';
    nextBtn.disabled = currentPage === totalPages;
    nextBtn.classList.add('px-3', 'py-1', 'rounded', 'bg-blue-600', 'text-white', 'disabled:opacity-50');
    nextBtn.addEventListener('click', () => {
        if (currentPage < totalPages) {
            currentPage++;
            renderEvents();
        }
    });
    paginationDiv.appendChild(nextBtn);

    document.getElementById('eventList').parentNode.appendChild(paginationDiv);
}

function removePaginationControls() {
    const existingControls = document.getElementById('paginationControls');
    if (existingControls) {
        existingControls.remove();
    }
}

// -------------------- دوال المصادقة --------------------

function setupAuthHandlers() {
    // عناصر واجهة المستخدم
    const authModal = document.getElementById('authModal');
    const authModalTitle = document.getElementById('authModalTitle');
    const authForm = document.getElementById('authForm');
    const toggleAuthMode = document.getElementById('toggleAuthMode');
    const registerFields = document.getElementById('registerFields');
    let isLoginMode = true;

    // تبديل بين وضعي تسجيل الدخول والتسجيل
    toggleAuthMode.addEventListener('click', () => {
        isLoginMode = !isLoginMode;
        authModalTitle.textContent = isLoginMode ? 'Login' : 'Register';
        toggleAuthMode.textContent = isLoginMode ? 'Switch to Register' : 'Switch to Login';
        registerFields.classList.toggle('hidden', isLoginMode);
    });

    // معالجة تقديم النموذج
    authForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('authUsername').value;
        const password = document.getElementById('authPassword').value;
        const email = isLoginMode ? null : document.getElementById('email').value;

        try {
            const response = await fetch(`${API_BASE_URL}/users.php`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    action: isLoginMode ? 'login' : 'register',
                    username,
                    password,
                    email
                })
            });

            const data = await response.json();

            if (response.ok) {
                if (isLoginMode) {
                    // حفظ التوكن ومعلومات المستخدم
                    localStorage.setItem('token', data.token);
                    currentUser = data.user;
                    isAuthenticated = true;
                    authModal.classList.add('hidden');
                    updateUIForAuthState();
                    fetchAndDisplayEvents();
                } else {
                    alert('Registration successful! Please login.');
                    isLoginMode = true;
                    authModalTitle.textContent = 'Login';
                    toggleAuthMode.textContent = 'Switch to Register';
                    registerFields.classList.add('hidden');
                    authForm.reset();
                }
            } else {
                alert(data.error || 'Authentication failed');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('An error occurred. Please try again.');
        }
    });

    // تحديث واجهة المستخدم بناءً على حالة المصادقة
    updateUIForAuthState();
}

async function checkAuthState() {
    const token = localStorage.getItem('token');
    if (!token) return;

    try {
        // التحقق من صحة التوكن مع الخادم
        const response = await fetch(`${API_BASE_URL}/users.php`, {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });

        if (response.ok) {
            const userData = await response.json();
            currentUser = userData;
            isAuthenticated = true;
            updateUIForAuthState();
        } else {
            logout();
        }
    } catch (error) {
        console.error('Error validating token:', error);
        logout();
    }
}

function updateUIForAuthState() {
    const authButtons = document.getElementById('authButtons');
    if (!authButtons) return;

    if (isAuthenticated) {
        authButtons.innerHTML = `
            <span class="text-white mr-4">Welcome, ${currentUser.username}</span>
            <button id="logoutBtn" class="hover:text-orange-500">Logout</button>
        `;
        document.getElementById('logoutBtn').addEventListener('click', logout);
    } else {
        authButtons.innerHTML = `
            <button id="loginBtn" class="hover:text-orange-500">Login</button>
            <span class="text-white mx-2">|</span>
            <button id="registerBtn" class="hover:text-orange-500">Register</button>
        `;
        document.getElementById('loginBtn').addEventListener('click', () => showAuthModal(true));
        document.getElementById('registerBtn').addEventListener('click', () => showAuthModal(false));
    }
}

function showAuthModal(loginMode = true) {
    const authModal = document.getElementById('authModal');
    const authModalTitle = document.getElementById('authModalTitle');
    const toggleAuthMode = document.getElementById('toggleAuthMode');
    const registerFields = document.getElementById('registerFields');

    isLoginMode = loginMode;
    authModalTitle.textContent = loginMode ? 'Login' : 'Register';
    toggleAuthMode.textContent = loginMode ? 'Switch to Register' : 'Switch to Login';
    registerFields.classList.toggle('hidden', loginMode);
    
    // إعادة تعيين النموذج
    const authForm = document.getElementById('authForm');
    authForm.reset();
    
    authModal.classList.remove('hidden');
}

function logout() {
    localStorage.removeItem('token');
    isAuthenticated = false;
    currentUser = null;
    updateUIForAuthState();
    fetchAndDisplayEvents();
}
</script>
