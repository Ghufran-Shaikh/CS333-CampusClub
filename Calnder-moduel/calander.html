<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Calendar</title>
    <link rel="icon" type="image/x-icon" href="Calendar-icon.jpeg">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin: 20px auto;
            max-width: 90vw;
            width: 100%;
        }
        .day {
            border: 1px solid #ccc;
            padding: 10px;
            cursor: pointer;
            text-align: center;
            font-size: 0.9rem;
            transition: background-color 0.3s;
        }
        .day:hover {
            background-color: #f0a500; 
        }
        .event-form {
            display: none; 
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .upcoming-events {
            position: fixed;  
            right: 20px;
            top: 100px;
            width: 400px;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .comments-section {
            margin: 40px auto;
            padding: 20px;
            width: 100%;
            max-width: 800px;
        }
        .comment {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #f8fafc;
        }
        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
            color: #4a5568;
        }
        .comment-content {
            color: #2d3748;
            line-height: 1.5;
        }
        .event-name {
            font-weight: bold;
            color: #2b6cb0;
            margin-bottom: 5px;
            font-size: 1.1rem;
        }
        @media (max-width: 768px) {
            .calendar {
                grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
            }
            .upcoming-events {
                position: static;
                width: 100%;
                max-height: none;
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>
<header class="bg-blue-800 fixed top-0 left-0 right-0 z-10 py-4 px-6">
    <nav>
        <ul class="flex space-x-6 justify-center items-center text-white font-bold">
            <li><a href="../index.html" target="_blank" class="hover:text-orange-500">Home</a></li>
            <li><a href="calander.html" target="_blank" class="hover:text-orange-500">Event Calendar</a></li>
            <li><a href="../study-group-finder/study-group-finder.html" target="_blank" class="hover:text-orange-500">Study Group Finder</a></li>
            <li><a href="../CourseReviews/CourseReviews.html" target="_blank" class="hover:text-orange-500">Course Reviews</a></li>
            <li><a href="../Course Notes/CourseNote.html" target="_blank" class="hover:text-orange-500">Course Note</a></li>
            <li><a href="../Club Activites/clubActivites.html" target="_blank" class="hover:text-orange-500">Clubs Activities</a></li>
        </ul>
    </nav>
</header>

<main class="flex-grow flex flex-col items-center pt-24 px-4">
    <div class="max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <h1 class="text-4xl font-bold text-blue-800 mb-2">Event Calendar</h1>
            <p class="text-gray-600 mb-4">Choose a date to add an event.</p>

            <div class="flex gap-2 mb-4 flex-wrap">
                <select id="monthSelect" class="border border-gray-300 p-2 rounded flex-1 min-w-[120px]"></select>
                <select id="yearSelect" class="border border-gray-300 p-2 rounded flex-1 min-w-[120px]"></select>
                <button id="generateBtn" class="bg-blue-800 text-white font-bold py-2 px-4 rounded">Generate</button>
            </div>

            <div class="calendar" id="calendar"></div>

            <div id="eventForm" class="event-form mt-4">
                <h3 class="font-bold mb-2">Add Event</h3>
                <label for="eventName">Event Name:</label>
                <input type="text" id="eventName" class="w-full p-2 border border-gray-300 rounded mb-2" />
                <label for="eventDateTime">Event Date and Time:</label>
                <input type="datetime-local" id="eventDateTime" class="w-full p-2 border border-gray-300 rounded mb-2" />
                <button id="saveEventBtn" class="bg-blue-800 text-white font-bold py-2 px-4 rounded mt-2">Submit</button>
            </div>
        </div>

        <div class="upcoming-events">
            <h2 class="text-2xl font-bold mb-4">Upcoming Events</h2>
            <input type="text" id="event-search" placeholder="🔍 Search for an event..." class="w-full p-2 border border-gray-300 rounded mb-4" oninput="updateEventList()">
            <div class="flex justify-between mb-4">
                <label for="sortSelect" class="font-bold">Sort By:</label>
                <select id="sortSelect" class="border border-gray-300 p-2 rounded" onchange="updateEventList()">
                    <option value="date">Date</option>
                    <option value="name">Name</option>
                </select>
            </div>
            <ul id="eventList" class="list-disc pl-5"></ul>
        </div>
    </div>

    <!-- قسم التعليقات -->
    <div class="comments-section">
        <h2 class="text-2xl font-bold mb-6 text-blue-800">Event Comments</h2>
        <div id="commentsContainer"></div>
    </div>
</main>

<footer class="bg-blue-800 text-white py-4 text-center mt-8">
    <div>&copy; 2025 ITCS333 Project</div>
    <div class="flex justify-center gap-4 mt-2">
        <a href="#" class="hover:text-orange-500">Club Policy</a>
        <a href="#" class="hover:text-orange-500">Terms</a>
        <a href="#" class="hover:text-orange-500">Contact</a>
        <a href="#" class="hover:text-orange-500">About</a>
        <a href="#" class="hover:text-orange-500">Help</a>
    </div>
</footer>

<script>
const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

let events = [];
let editingEventId = null;

const externalDataUrl = 'https://raw.githubusercontent.com/Ghufran-Shaikh/CS333-CampusClub/refs/heads/Calander-moduel(Phase2)/Calnder-moduel/EventData.json';
const commentsUrl = 'https://raw.githubusercontent.com/Ghufran-Shaikh/CS333-CampusClub/refs/heads/Calander-moduel(Phase2)/Calnder-moduel/comment.json';

const eventsPerPage = 5;
let currentPage = 1;
let filteredEvents = [];

// إنشاء التقويم
const generateCalendar = (year, month) => {
    const calendar = document.getElementById('calendar');
    calendar.innerHTML = '';
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for (let day = 1; day <= daysInMonth; day++) {
        const dayElement = document.createElement('div');
        dayElement.classList.add('day');
        dayElement.textContent = day;

        dayElement.addEventListener('click', () => {
            openEventForm(year, month + 1, day);
        });

        calendar.appendChild(dayElement);
    }
};

// تعبئة خيارات الشهر والسنة
const populateSelects = () => {
    const monthSelect = document.getElementById('monthSelect');
    const yearSelect = document.getElementById('yearSelect');

    months.forEach((month, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.textContent = month;
        monthSelect.appendChild(option);
    });

    const currentYear = new Date().getFullYear();
    for (let i = currentYear; i <= currentYear + 10; i++) {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = i;
        yearSelect.appendChild(option);
    }
};

// فتح نموذج الحدث
function openEventForm(year, month, day, event = null) {
    const eventForm = document.getElementById('eventForm');
    eventForm.style.display = 'block';
    document.getElementById('eventName').value = event ? event.title : '';
    const eventDateTimeInput = document.getElementById('eventDateTime');
    if (event) {
        eventDateTimeInput.value = `${event.date}T${event.time}`;
        editingEventId = event.id;
    } else {
        eventDateTimeInput.value = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}T00:00`;
        editingEventId = null;
    }
}

// عرض الأحداث
const renderEvents = () => {
    const eventList = document.getElementById('eventList');
    eventList.innerHTML = '';

    if (filteredEvents.length === 0) {
        const emptyItem = document.createElement('li');
        emptyItem.textContent = 'No matching events.';
        eventList.appendChild(emptyItem);
        removePaginationControls();
        return;
    }

    const startIndex = (currentPage - 1) * eventsPerPage;
    const endIndex = Math.min(startIndex + eventsPerPage, filteredEvents.length);
    const eventsToShow = filteredEvents.slice(startIndex, endIndex);

    eventsToShow.forEach(event => {
        const eventItem = document.createElement('li');
        eventItem.classList.add('event-item');
        const eventDate = new Date(`${event.date}T${event.time}`);
        eventItem.textContent = `${eventDate.toLocaleString()} - ${event.title}`;

        const btnContainer = document.createElement('span');
        btnContainer.style.marginLeft = '10px';

        const editBtn = document.createElement('button');
        editBtn.textContent = 'Edit';
        editBtn.style.marginRight = '5px';
        editBtn.classList.add('bg-yellow-400', 'text-black', 'rounded', 'px-2', 'py-0.5', 'hover:bg-yellow-500', 'cursor-pointer');
        editBtn.onclick = () => openEventFormFromId(event.id);

        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = 'Delete';
        deleteBtn.classList.add('bg-red-600', 'text-white', 'rounded', 'px-2', 'py-0.5', 'hover:bg-red-700', 'cursor-pointer');
        deleteBtn.onclick = () => deleteEvent(event.id);

        btnContainer.appendChild(editBtn);
        btnContainer.appendChild(deleteBtn);
        eventItem.appendChild(btnContainer);

        eventList.appendChild(eventItem);
    });

    renderPaginationControls();
};

// عناصر التحكم في الصفحات
const renderPaginationControls = () => {
    removePaginationControls();

    const eventListContainer = document.getElementById('eventList').parentNode;
    const paginationDiv = document.createElement('div');
    paginationDiv.id = 'paginationControls';
    paginationDiv.classList.add('flex', 'justify-center', 'gap-2', 'mt-4', 'flex-wrap');

    const totalPages = Math.ceil(filteredEvents.length / eventsPerPage);

    // زر السابق
    const prevBtn = document.createElement('button');
    prevBtn.textContent = 'Previous';
    prevBtn.disabled = currentPage === 1;
    prevBtn.classList.add('bg-blue-600', 'text-white', 'px-3', 'py-1', 'rounded', 'hover:bg-blue-700', 'disabled:opacity-50', 'disabled:cursor-not-allowed');
    prevBtn.onclick = () => {
        if (currentPage > 1) {
            currentPage--;
            renderEvents();
        }
    };
    paginationDiv.appendChild(prevBtn);

    // أرقام الصفحات
    let startPage = Math.max(1, currentPage - 2);
    let endPage = Math.min(totalPages, startPage + 4);
    if (endPage - startPage < 4) {
        startPage = Math.max(1, endPage - 4);
    }

    for (let i = startPage; i <= endPage; i++) {
        const pageBtn = document.createElement('button');
        pageBtn.textContent = i;
        if (i === currentPage) {
            pageBtn.classList.add('bg-blue-800', 'text-white', 'font-bold', 'px-3', 'py-1', 'rounded');
        } else {
            pageBtn.classList.add('bg-gray-200', 'text-gray-700', 'px-3', 'py-1', 'rounded', 'hover:bg-gray-300');
            pageBtn.onclick = () => {
                currentPage = i;
                renderEvents();
            };
        }
        paginationDiv.appendChild(pageBtn);
    }

    // زر التالي
    const nextBtn = document.createElement('button');
    nextBtn.textContent = 'Next';
    nextBtn.disabled = currentPage === totalPages;
    nextBtn.classList.add('bg-blue-600', 'text-white', 'px-3', 'py-1', 'rounded', 'hover:bg-blue-700', 'disabled:opacity-50', 'disabled:cursor-not-allowed');
    nextBtn.onclick = () => {
        if (currentPage < totalPages) {
            currentPage++;
            renderEvents();
        }
    };
    paginationDiv.appendChild(nextBtn);

    eventListContainer.appendChild(paginationDiv);
};

const removePaginationControls = () => {
    const existingControls = document.getElementById('paginationControls');
    if (existingControls) {
        existingControls.remove();
    }
};

const filterEventsList = () => {
    const searchTerm = document.getElementById('event-search').value.toLowerCase();
    filteredEvents = events.filter(event => event.title.toLowerCase().includes(searchTerm));
};

const sortFilteredEvents = () => {
    const sortCriteria = document.getElementById('sortSelect').value;

    filteredEvents.sort((a, b) => {
        if (sortCriteria === 'date') {
            return new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`);
        } else {
            return a.title.localeCompare(b.title);
        }
    });
};

const updateEventList = () => {
    currentPage = 1;
    filterEventsList();
    sortFilteredEvents();
    renderEvents();
};

const saveEvent = () => {
    const eventNameInput = document.getElementById('eventName');
    const eventDateTimeInput = document.getElementById('eventDateTime');
    const eventName = eventNameInput.value.trim();
    const eventDateTimeVal = eventDateTimeInput.value;

    if (!eventName) {
        alert('Please enter an event name.');
        return;
    }
    if (!eventDateTimeVal) {
        alert('Please select a date and time for the event.');
        return;
    }

    const datePart = eventDateTimeVal.split('T')[0];
    const timePart = eventDateTimeVal.split('T')[1];

    if (editingEventId !== null) {
        const idx = events.findIndex(e => e.id === editingEventId);
        if (idx !== -1) {
            events[idx].title = eventName;
            events[idx].date = datePart;
            events[idx].time = timePart;
        }
    } else {
        const newId = events.length > 0 ? Math.max(...events.map(e => e.id)) + 1 : 1;
        const newEvent = {
            id: newId,
            title: eventName,
            description: '',
            date: datePart,
            time: timePart
        };
        events.push(newEvent);
    }

    editingEventId = null;
    document.getElementById('eventForm').style.display = 'none';
    eventNameInput.value = '';
    eventDateTimeInput.value = '';
    updateEventList();
};

const deleteEvent = (id) => {
    if (confirm('Are you sure you want to delete this event?')) {
        events = events.filter(ev => ev.id !== id);
        updateEventList();
    }
};

const openEventFormFromId = (id) => {
    const event = events.find(ev => ev.id === id);
    if (event) {
        openEventForm(null, null, null, event);
    }
};

// جلب الأحداث الخارجية
async function fetchExternalEvents() {
    const eventList = document.getElementById('eventList');
    const loadingItem = document.createElement('li');
    loadingItem.textContent = 'Loading events...';
    eventList.appendChild(loadingItem);

    try {
        const response = await fetch(`${externalDataUrl}?t=${new Date().getTime()}`);
        if (!response.ok) {
            throw new Error(`HTTP error! Status: ${response.status}`);
        }

        const data = await response.json();

        data.forEach((ev) => {
            const existing = events.find(e => e.title === ev.title && e.date === ev.date && e.time === ev.time);
            if (!existing) {
                events.push({
                    id: events.length > 0 ? Math.max(...events.map(e => e.id)) + 1 : 1,
                    title: ev.title,
                    description: ev.description || '',
                    date: ev.date,
                    time: ev.time + (ev.time.length === 5 ? ':00' : '')
                });
            }
        });

        updateEventList();

    } catch (error) {
        eventList.innerHTML = '';
        const errorItem = document.createElement('li');
        errorItem.textContent = 'Failed to load events. Please try again later.';
        errorItem.style.color = 'red';
        eventList.appendChild(errorItem);
        console.error('Error fetching events:', error);
    }
}

// جلب وعرض التعليقات
async function fetchAndDisplayComments() {
    const commentsContainer = document.getElementById('commentsContainer');
    commentsContainer.innerHTML = '<p>Loading comments...</p>';

    try {
        // إضافة طابع زمني لمنع التخزين المؤقت
        const response = await fetch(`${commentsUrl}?t=${new Date().getTime()}`);
        
        if (!response.ok) {
            throw new Error(`Failed to load comments: ${response.status}`);
        }

        const comments = await response.json();
        
        if (!comments || comments.length === 0) {
            commentsContainer.innerHTML = '<p>No comments available yet.</p>';
            return;
        }

        commentsContainer.innerHTML = '';
        
        // تجميع التعليقات حسب الحدث
        const commentsByEvent = {};
        comments.forEach(comment => {
            if (!commentsByEvent[comment.event_id]) {
                commentsByEvent[comment.event_id] = [];
            }
            commentsByEvent[comment.event_id].push(comment);
        });

        // عرض التعليقات
        for (const eventId in commentsByEvent) {
            const eventComments = commentsByEvent[eventId];
            
            const eventGroup = document.createElement('div');
            eventGroup.className = 'event-comments-group mb-8 p-4 bg-blue-50 rounded-lg';
            
            // البحث عن اسم الحدث
            const event = events.find(e => e.id == eventId);
            const eventTitle = event ? event.title : `Event ID: ${eventId}`;
            
            const eventTitleElement = document.createElement('h3');
            eventTitleElement.className = 'event-name';
            eventTitleElement.textContent = eventTitle;
            eventGroup.appendChild(eventTitleElement);
            
            eventComments.forEach(comment => {
                const commentElement = document.createElement('div');
                commentElement.className = 'comment';
                
                const header = document.createElement('div');
                header.className = 'comment-header';
                
                const authorSpan = document.createElement('span');
                authorSpan.textContent = `By: ${comment.author}`;
                
                const dateSpan = document.createElement('span');
                const commentDate = new Date(comment.created_at);
                dateSpan.textContent = commentDate.toLocaleString();
                
                header.appendChild(authorSpan);
                header.appendChild(dateSpan);
                
                const content = document.createElement('div');
                content.className = 'comment-content mt-2';
                content.textContent = comment.comment;
                
                commentElement.appendChild(header);
                commentElement.appendChild(content);
                
                eventGroup.appendChild(commentElement);
            });
            
            commentsContainer.appendChild(eventGroup);
        }

    } catch (error) {
        console.error('Error loading comments:', error);
        commentsContainer.innerHTML = `
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
                <strong>Error loading comments:</strong> ${error.message}
                <br>Please check the console for details.
            </div>
        `;
    }
}

// تحميل الصفحة
window.onload = async () => {
    populateSelects();
    const today = new Date();
    document.getElementById('monthSelect').value = today.getMonth();
    document.getElementById('yearSelect').value = today.getFullYear();
    generateCalendar(today.getFullYear(), today.getMonth());

    document.getElementById('saveEventBtn').addEventListener('click', saveEvent);
    document.getElementById('sortSelect').addEventListener('change', updateEventList);
    document.getElementById('event-search').addEventListener('input', updateEventList);

    try {
        await fetchExternalEvents();
        await fetchAndDisplayComments();
    } catch (error) {
        console.error('Initialization error:', error);
    }
};
</script>
</body>
</html>
