<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Calendar</title>
    <link rel="icon" type="image/x-icon" href="Calendar-icon.jpeg">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin: 20px auto;
            max-width: 90vw;
            width: 100%;
        }
        .day {
            border: 1px solid #ccc;
            padding: 10px;
            cursor: pointer;
            text-align: center;
            font-size: 0.9rem;
            transition: background-color 0.3s;
        }
        .day:hover {
            background-color: #f0a500; 
        }
        .event-form {
            display: none; 
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .upcoming-events {
            position: fixed;  
            right: 20px;
            top: 100px;
            width: 400px; 
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        @media (max-width: 768px) {
            .calendar {
                grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
            }
        }
        @media (max-width: 1024px) {
            .upcoming-events {
                position: static; 
                width: 100%;
                max-height: none;
                margin-top: 20px;
            }
        }
        /* Modal styles */
        .modal {
            display: flex;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: #fefefe;
            margin: auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 500px;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }

        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
<header class="bg-blue-800 fixed top-0 left-0 right-0 z-10 py-4 px-6">
    <nav>
        <ul class="flex space-x-6 justify-center items-center text-white font-bold">
            <li><a href="../index.html" target="_blank" class="hover:text-orange-500">Home</a></li>
            <li><a href="calander.html" target="_blank" class="hover:text-orange-500">Event Calendar</a></li>
            <li><a href="../study-group-finder/study-group-finder.html" target="_blank" class="hover:text-orange-500">Study Group Finder</a></li>
            <li><a href="../CourseReviews/CourseReviews.html" target="_blank" class="hover:text-orange-500">Course Reviews</a></li>
            <li><a href="../Course Notes/CourseNote.html" target="_blank" class="hover:text-orange-500">Course Note</a></li>
            <li><a href="../Club Activites/clubActivites.html" target="_blank" class="hover:text-orange-500">Clubs Activities</a></li>
        </ul>
    </nav>
</header>

<main class="flex-grow flex flex-col items-center pt-24 px-4">
    <div class="max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <h1 class="text-4xl font-bold text-blue-800 mb-2">Event Calendar</h1>
            <p class="text-gray-600 mb-4">Choose a date to add an event.</p>

            <div class="flex gap-2 mb-4 flex-wrap">
                <select id="monthSelect" class="border border-gray-300 p-2 rounded flex-1 min-w-[120px]"></select>
                <select id="yearSelect" class="border border-gray-300 p-2 rounded flex-1 min-w-[120px]"></select>
                <button id="generateBtn" class="bg-blue-800 text-white font-bold py-2 px-4 rounded">Generate</button>
            </div>

            <div class="calendar" id="calendar"></div>

            <div id="eventForm" class="event-form mt-4">
                <h3 class="font-bold mb-2">Add Event</h3>
                <label for="eventName">Event Name:</label>
                <input type="text" id="eventName" class="w-full p-2 border border-gray-300 rounded mb-2" />
                <label for="eventDateTime">Event Date and Time:</label>
                <input type="datetime-local" id="eventDateTime" class="w-full p-2 border border-gray-300 rounded mb-2" />
                <button id="saveEventBtn" class="bg-blue-800 text-white font-bold py-2 px-4 rounded mt-2">Submit</button>
            </div>

            <div id="eventComments" class="event-comments mt-4">
                <h4 class="font-bold mb-2">Comments</h4>
                <ul id="commentList" class="list-disc pl-5"></ul>
                <input type="text" id="commentInput" class="w-full p-2 border border-gray-300 rounded mb-2" placeholder="Add a comment..." />
                <button id="addCommentBtn" class="bg-blue-800 text-white font-bold py-2 px-4 rounded mt-2">Add Comment</button>
            </div>
        </div>

        <div class="upcoming-events">
            <h2 class="text-2xl font-bold mb-4">Upcoming Events</h2>
            <input type="text" id="event-search" placeholder="🔍 Search for an event..." class="w-full p-2 border border-gray-300 rounded mb-4" oninput="updateEventList()">
            <div class="flex justify-between mb-4">
                <label for="sortSelect" class="font-bold">Sort By:</label>
                <select id="sortSelect" class="border border-gray-300 p-2 rounded" onchange="updateEventList()">
                    <option value="date">Date</option>
                    <option value="name">Name</option>
                </select>
            </div>
            <ul id="eventList" class="list-disc pl-5"></ul>
        </div>
    </div>
</main>

<footer class="bg-blue-800 text-white py-4 text-center mt-8">
    <div>&copy; 2025 ITCS333 Project</div>
    <div class="flex justify-center gap-4 mt-2">
        <a href="#" class="hover:text-orange-500">Club Policy</a>
        <a href="#" class="hover:text-orange-500">Terms</a>
        <a href="#" class="hover:text-orange-500">Contact</a>
        <a href="#" class="hover:text-orange-500">About</a>
        <a href="#" class="hover:text-orange-500">Help</a>
    </div>
</footer>



<script>
// -------------------- Full JavaScript for Event Calendar --------------------
const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

let events = []; // Holds all current events
let editingEventId = null; // Track if currently editing an event

const externalDataUrl ='https://b93f06a9-58d9-4783-b144-c3ff3f5f0fc5-00-10att636lrm9h.pike.replit.dev/api.php';


const eventsPerPage = 5;  // Number of events per page for pagination
let currentPage = 1;      // Current visible page in pagination
let filteredEvents = [];  // Store filtered events to paginate

// Generate calendar for given year and month
const generateCalendar = (year, month) => {
    const calendar = document.getElementById('calendar');
    calendar.innerHTML = ''; 
    const daysInMonth = new Date(year, month + 1, 0).getDate(); 

    for (let day = 1; day <= daysInMonth; day++) {
        const dayElement = document.createElement('div');
        dayElement.classList.add('day');
        dayElement.textContent = day;

        dayElement.addEventListener('click', () => {
            openEventForm(year, month + 1, day);
        });

        calendar.appendChild(dayElement);
    }
};

// Populate month and year selectors
const populateSelects = () => {
    const monthSelect = document.getElementById('monthSelect');
    const yearSelect = document.getElementById('yearSelect');

    if (monthSelect.options.length === 0) {
        months.forEach((month, index) => {
            const option = document.createElement('option');
            option.value = index;
            option.textContent = month;
            monthSelect.appendChild(option);
        });
    }

    if (yearSelect.options.length === 0) {
        const currentYear = new Date().getFullYear();
        for (let i = currentYear; i <= currentYear + 10; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = i;
            yearSelect.appendChild(option);
        }
    }
};

// Open event form for adding or editing event
function openEventForm(year, month, day, event = null) {
    const eventForm = document.getElementById('eventForm');
    eventForm.style.display = 'block'; 
    document.getElementById('eventName').value = event ? event.title : '';
    const eventDateTimeInput = document.getElementById('eventDateTime');
    if (event) {
        eventDateTimeInput.value = `${event.date}T${event.time}`;
        editingEventId = event.id;
        renderComments(event.id);
    } else {
        eventDateTimeInput.value = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}T00:00`;
        editingEventId = null;
    }
}

// Render events
const renderEvents = () => {
    const eventList = document.getElementById('eventList');
    eventList.innerHTML = '';

    if (filteredEvents.length === 0) {
        const emptyItem = document.createElement('li');
        emptyItem.textContent = 'No matching events found';
        eventList.appendChild(emptyItem);
        removePaginationControls();
        return;
    }

    const startIndex = (currentPage - 1) * eventsPerPage;
    const endIndex = Math.min(startIndex + eventsPerPage, filteredEvents.length);
    const eventsToShow = filteredEvents.slice(startIndex, endIndex);

    eventsToShow.forEach(event => {
        const eventItem = document.createElement('li');
        eventItem.classList.add('event-item', 'flex', 'justify-between', 'items-center', 'p-2', 'border-b');

        const eventInfo = document.createElement('div');
        const eventDate = new Date(`${event.date}T${event.time}`);
        eventInfo.innerHTML = `<strong>${event.title}</strong><br><small>${eventDate.toLocaleString()}</small>`;

        const actionSelect = document.createElement('select');
        actionSelect.classList.add('border', 'border-gray-300', 'p-1', 'rounded', 'ml-4');

        const placeholderOption = document.createElement('option');
        placeholderOption.textContent = 'Options';
        placeholderOption.disabled = true;
        placeholderOption.selected = true;
        actionSelect.appendChild(placeholderOption);

        const detailsOption = document.createElement('option');
        detailsOption.value = 'details';
        detailsOption.textContent = 'Details';
        actionSelect.appendChild(detailsOption);

        const editOption = document.createElement('option');
        editOption.value = 'edit';
        editOption.textContent = 'Edit';
        actionSelect.appendChild(editOption);

        const deleteOption = document.createElement('option');
        deleteOption.value = 'delete';
        deleteOption.textContent = 'Delete';
        actionSelect.appendChild(deleteOption);

        actionSelect.addEventListener('change', (e) => {
            if (e.target.value === 'details') {
                showEventDetails(event); 
            } else if (e.target.value === 'edit') {
                openEventFormFromId(event.id);
            } else if (e.target.value === 'delete') {
                deleteEvent(event.id);
            }
            actionSelect.value = ''; // Reset selection
        });

        eventItem.appendChild(eventInfo);
        eventItem.appendChild(actionSelect);
        eventList.appendChild(eventItem);
    });

    renderPaginationControls();
};

// Render pagination controls below event list
const renderPaginationControls = () => {
    removePaginationControls();

    const eventListContainer = document.getElementById('eventList').parentNode;

    const paginationDiv = document.createElement('div');
    paginationDiv.id = 'paginationControls';
    paginationDiv.classList.add('flex', 'justify-center', 'gap-2', 'mt-4', 'flex-wrap');

    const totalPages = Math.ceil(filteredEvents.length / eventsPerPage);

    // Previous button
    const prevBtn = document.createElement('button');
    prevBtn.textContent = 'Previous';
    prevBtn.disabled = currentPage === 1;
    prevBtn.classList.add('bg-blue-600', 'text-white', 'px-3', 'py-1', 'rounded', 'hover:bg-blue-700', 'disabled:opacity-50', 'disabled:cursor-not-allowed');
    prevBtn.onclick = () => {
        if (currentPage > 1) {
            currentPage--;
            renderEvents();
        }
    };
    paginationDiv.appendChild(prevBtn);

    // Page numbers - show max 5 pages with current in center
    let startPage = Math.max(1, currentPage - 2);
    let endPage = Math.min(totalPages, startPage + 4);
    if (endPage - startPage < 4) {
        startPage = Math.max(1, endPage - 4);
    }

    for (let i = startPage; i <= endPage; i++) {
        const pageBtn = document.createElement('button');
        pageBtn.textContent = i;
        if (i === currentPage) {
            pageBtn.classList.add('bg-blue-800', 'text-white', 'font-bold', 'px-3', 'py-1', 'rounded');
        } else {
            pageBtn.classList.add('bg-gray-200', 'text-gray-700', 'px-3', 'py-1', 'rounded', 'hover:bg-gray-300');
            pageBtn.onclick = () => {
                currentPage = i;
                renderEvents();
            };
        }
        paginationDiv.appendChild(pageBtn);
    }

    // Next button
    const nextBtn = document.createElement('button');
    nextBtn.textContent = 'Next';
    nextBtn.disabled = currentPage === totalPages;
    nextBtn.classList.add('bg-blue-600', 'text-white', 'px-3', 'py-1', 'rounded', 'hover:bg-blue-700', 'disabled:opacity-50', 'disabled:cursor-not-allowed');
    nextBtn.onclick = () => {
        if (currentPage < totalPages) {
            currentPage++;
            renderEvents();
        }
    };
    paginationDiv.appendChild(nextBtn);

    eventListContainer.appendChild(paginationDiv);
};

// Remove existing pagination controls
const removePaginationControls = () => {
    const existingControls = document.getElementById('paginationControls');
    if (existingControls) {
        existingControls.remove();
    }
};

// Filter events by search term
const filterEventsList = () => {
    const searchTerm = document.getElementById('event-search').value.toLowerCase();
    filteredEvents = events.filter(event => event.title.toLowerCase().includes(searchTerm));
};

// Sort filtered events array
const sortFilteredEvents = () => {
    const sortCriteria = document.getElementById('sortSelect').value;

    filteredEvents.sort((a, b) => {
        if (sortCriteria === 'date') {
            return new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`);
        } else {
            return a.title.localeCompare(b.title);
        }
    });
};

// Update event list with sorting, filtering, and pagination
const updateEventList = () => {
    currentPage = 1; // Reset to first page on any update
    filterEventsList();
    sortFilteredEvents();
    renderEvents();
};

// Save event from form (add new or update existing)
const saveEvent = async () => {
    const eventNameInput = document.getElementById('eventName');
    const eventDateTimeInput = document.getElementById('eventDateTime');
    const eventName = eventNameInput.value.trim();
    const eventDateTimeVal = eventDateTimeInput.value;

    if (!eventName) {
        alert('Please enter an event name.');
        return;
    }
    if (!eventDateTimeVal) {
        alert('Please select a date and time for the event.');
        return;
    }

    const datePart = eventDateTimeVal.split('T')[0];
    const timePart = eventDateTimeVal.split('T')[1];

    const eventData = {
        title: eventName,
        description: '',
        date: datePart,
        time: timePart
    };
const externalDataUrl = 'https://b93f06a9-58d9-4783-b144-c3ff3f5f0fc5-00-10att636lrm9h.pike.replit.dev/api.php';
    try {
        const response = await fetch('externalDataUrl', {
            method: 'POST',
            body: JSON.stringify(eventData),
            headers: {
                'Content-Type': 'application/json',
            }
        });

        const result = await response.json();
        if (result.message === 'Event saved successfully') {
            events.push({
                id: events.length + 1,
                title: eventName,
                description: '',
                date: datePart,
                time: timePart,
                comments: []
            });
            updateEventList();
        }
    } catch (error) {
        console.error('Error saving event:', error);
    }
};


// Delete event by id
const deleteEvent = async (id) => {
    if (confirm('Are you sure you want to delete this event?')) {
        try {
            const response = await fetch('api.php', {
                method: 'DELETE',
                body: JSON.stringify({ id }),
                headers: {
                    'Content-Type': 'application/json',
                }
            });

            const result = await response.json();
            if (result.message === 'Event deleted successfully') {
                events = events.filter(event => event.id !== id);
                updateEventList();
            }
        } catch (error) {
            console.error('Error deleting event:', error);
        }
    }
};


// Show event details in a modal
const showEventDetails = (event) => {
    // Create modal container
    const modal = document.createElement('div');
    modal.classList.add('modal');
    
    const modalContent = document.createElement('div');
    modalContent.classList.add('modal-content');

    const closeButton = document.createElement('span');
    closeButton.classList.add('close');
    closeButton.innerHTML = '&times;';
    closeButton.onclick = () => {
        modal.remove();
    };

    const eventDate = new Date(`${event.date}T${event.time}`);
    modalContent.innerHTML = `
        <h2 class="text-2xl font-bold mb-4">${event.title}</h2>
        <p><strong>Date -Time:</strong> ${eventDate.toLocaleString()}</p>
        <p class="mt-2"><strong>Description:</strong> ${event.description || 'No description'}</p>
    `;
    modalContent.appendChild(closeButton);
    modal.appendChild(modalContent);
    document.body.appendChild(modal);
};

// Load external data
const loadExternalData = async () => {
    try {
        const response = await fetch('api.php');
        const data = await response.json();
        events = data.map((event, index) => ({
            id: event.id,
            title: event.title,
            description: event.description,
            date: event.date,
            time: event.time,
            comments: []
        }));
        updateEventList();
    } catch (error) {
        console.error('Error loading external data:', error);
    }
};

window.onload = () => {
    populateSelects();
    const today = new Date();
    document.getElementById('monthSelect').value = today.getMonth();
    document.getElementById('yearSelect').value = today.getFullYear();
    generateCalendar(today.getFullYear(), today.getMonth());
    loadExternalData();
};

document.getElementById('generateBtn').addEventListener('click', () => {
    const year = parseInt(document.getElementById('yearSelect').value);
    const month = parseInt(document.getElementById('monthSelect').value);
    generateCalendar(year, month);
});

document.getElementById('saveEventBtn').addEventListener('click', saveEvent);
// Fetch all events from the backend
const fetchEvents = async () => {
    try {
        const response = await fetch('api.php');
        const data = await response.json();
        events = data;
        updateEventList();
    } catch (error) {
        console.error('Error fetching events:', error);
    }
};

// Call fetchEvents on page load
document.addEventListener('DOMContentLoaded', () => {
    populateSelects();

    const today = new Date();
    document.getElementById('monthSelect').value = today.getMonth();
    document.getElementById('yearSelect').value = today.getFullYear();
    generateCalendar(today.getFullYear(), today.getMonth());

    document.getElementById('generateBtn').addEventListener('click', () => {
        const selectedMonth = parseInt(document.getElementById('monthSelect').value);
        const selectedYear = parseInt(document.getElementById('yearSelect').value);
        generateCalendar(selectedYear, selectedMonth);
    });

    document.getElementById('saveEventBtn').addEventListener('click', saveEvent);
    document.getElementById('addCommentBtn').addEventListener('click', addComment);

    // 👇 Fetch the events when page loads
    fetchEvents();
});

</script>

</body>
</html>
