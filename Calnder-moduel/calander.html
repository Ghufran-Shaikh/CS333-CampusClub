<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Calendar</title>
    <link rel="icon" type="image/x-icon" href="Calendar-icon.jpeg">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin: 20px auto;
            max-width: 90vw;
            width: 100%;
        }

        .day {
            border: 1px solid #ccc;
            padding: 10px;
            cursor: pointer;
            text-align: center;
            font-size: 0.9rem;
            transition: background-color 0.3s;
        }

        .day:hover {
            background-color: #f0a500; 
        }

        .event-form {
            display: none; 
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        .upcoming-events {
            position: fixed;  
            right: 20px;
            top: 100px;
            width: 400px;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .comments-section {
            margin: 40px auto;
            padding: 20px;
            width: 100%;
            max-width: 800px;
        }

        .comment {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #f8fafc;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
            color: #4a5568;
        }

        .comment-content {
            color: #2d3748;
            line-height: 1.5;
        }

        .event-name {
            font-weight: bold;
            color: #2b6cb0;
            margin-bottom: 5px;
            font-size: 1.1rem;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin-left: 10px;
        }

        .action-btn {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            border: none;
            color: white;
        }

        .delete-btn {
            background-color: #ef4444;
        }

        .edit-btn {
            background-color: #f59e0b;
        }

        .details-btn {
            background-color: #10b981;
        }

        .comment-form {
            margin-top: 15px;
            padding: 10px;
            background: #f0f4f8;
            border-radius: 5px;
        }

        @media (max-width: 768px) {
            .calendar {
                grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
            }

            .upcoming-events {
                position: static;
                width: 100%;
                max-height: none;
                margin-top: 20px;
            }

            .action-buttons {
                flex-direction: column;
                gap: 4px;
            }
        }
    </style>
</head>
<body>
<header class="bg-blue-800 fixed top-0 left-0 right-0 z-10 py-4 px-6">
    <nav>
        <ul class="flex space-x-6 justify-center items-center text-white font-bold">
            <li><a href="../index.html" target="_blank" class="hover:text-orange-500">Home</a></li>
            <li><a href="calander.html" target="_blank" class="hover:text-orange-500">Event Calendar</a></li>
            <li><a href="../study-group-finder/study-group-finder.html" target="_blank" class="hover:text-orange-500">Study Group Finder</a></li>
            <li><a href="../CourseReviews/CourseReviews.html" target="_blank" class="hover:text-orange-500">Course Reviews</a></li>
            <li><a href="../Course Notes/CourseNote.html" target="_blank" class="hover:text-orange-500">Course Note</a></li>
            <li><a href="../Club Activites/clubActivites.html" target="_blank" class="hover:text-orange-500">Clubs Activities</a></li>
        </ul>
    </nav>
</header>

<main class="flex-grow flex flex-col items-center pt-24 px-4">
    <div class="max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <h1 class="text-4xl font-bold text-blue-800 mb-2">Event Calendar</h1>
            <p class="text-gray-600 mb-4">Choose a date to add an event.</p>

            <div class="flex gap-2 mb-4 flex-wrap">
                <select id="monthSelect" class="border border-gray-300 p-2 rounded flex-1 min-w-[120px]"></select>
                <select id="yearSelect" class="border border-gray-300 p-2 rounded flex-1 min-w-[120px]"></select>
                <button id="generateBtn" class="bg-blue-800 text-white font-bold py-2 px-4 rounded">Generate</button>
            </div>

            <div class="calendar" id="calendar"></div>

            <div id="eventForm" class="event-form mt-4">
                <h3 class="font-bold mb-2">Add Event</h3>
                <label for="eventName">Event Name:</label>
                <input type="text" id="eventName" class="w-full p-2 border border-gray-300 rounded mb-2" />
                <label for="eventDescription">Event Description:</label>
                <textarea id="eventDescription" class="w-full p-2 border border-gray-300 rounded mb-2"></textarea>
                <label for="eventDateTime">Event Date and Time:</label>
                <input type="datetime-local" id="eventDateTime" class="w-full p-2 border border-gray-300 rounded mb-2" />
                <button id="saveEventBtn" class="bg-blue-800 text-white font-bold py-2 px-4 rounded mt-2">Submit</button>
            </div>
        </div>

        <div class="upcoming-events">
            <h2 class="text-2xl font-bold mb-4">Upcoming Events</h2>
            <input type="text" id="event-search" placeholder="🔍 Search for an event..." class="w-full p-2 border border-gray-300 rounded mb-4" oninput="updateEventList()">
            <div class="flex justify-between mb-4">
                <label for="sortSelect" class="font-bold">Sort By:</label>
                <select id="sortSelect" class="border border-gray-300 p-2 rounded" onchange="updateEventList()">
                    <option value="date">Date</option>
                    <option value="name">Name</option>
                </select>
            </div>
            <ul id="eventList" class="space-y-3"></ul>
        </div>
    </div>

    <!-- Comments Section -->
    <div class="comments-section">
        <h2 class="text-2xl font-bold mb-6 text-blue-800">Event Comments</h2>
        <div id="commentsContainer"></div>
        <h3 class="font-bold mt-4">Add a Comment</h3>
        <input type="text" id="newCommentAuthor" placeholder="Your name" class="w-full p-2 mb-2 border rounded">
        <textarea id="newCommentContent" placeholder="Your comment" class="w-full p-2 mb-2 border rounded"></textarea>
        <button onclick="addNewComment()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Add Comment</button>
    </div>
</main>

<footer class="bg-blue-800 text-white py-4 text-center mt-8">
    <div>&copy; 2025 ITCS333 Project</div>
    <div class="flex justify-center gap-4 mt-2">
        <a href="#" class="hover:text-orange-500">Club Policy</a>
        <a href="#" class="hover:text-orange-500">Terms</a>
        <a href="#" class="hover:text-orange-500">Contact</a>
        <a href="#" class="hover:text-orange-500">About</a>
        <a href="#" class="hover:text-orange-500">Help</a>
    </div>
</footer>

<script>
const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

let events = [];
let editingEventId = null;

const eventsPerPage = 5;
let currentPage = 1;
let filteredEvents = [];

// Generate calendar
const generateCalendar = (year, month) => {
    const calendar = document.getElementById('calendar');
    calendar.innerHTML = '';
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for (let day = 1; day <= daysInMonth; day++) {
        const dayElement = document.createElement('div');
        dayElement.classList.add('day');
        dayElement.textContent = day;

        dayElement.addEventListener('click', () => {
            openEventForm(year, month + 1, day);
        });

        calendar.appendChild(dayElement);
    }
};

// Populate month and year selects
const populateSelects = () => {
    const monthSelect = document.getElementById('monthSelect');
    const yearSelect = document.getElementById('yearSelect');

    months.forEach((month, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.textContent = month;
        monthSelect.appendChild(option);
    });

    const currentYear = new Date().getFullYear();
    for (let i = currentYear; i <= currentYear + 10; i++) {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = i;
        yearSelect.appendChild(option);
    }
};

// Open event form
function openEventForm(year, month, day, event = null) {
    const eventForm = document.getElementById('eventForm');
    eventForm.style.display = 'block';
    document.getElementById('eventName').value = event ? event.title : '';
    document.getElementById('eventDescription').value = event ? event.description : '';
    const eventDateTimeInput = document.getElementById('eventDateTime');
    if (event) {
        eventDateTimeInput.value = `${event.date}T${event.time}`;
        editingEventId = event.id;
    } else {
        eventDateTimeInput.value = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}T00:00`;
        editingEventId = null;
    }
}

// Add new comment
function addNewComment() {
    const author = document.getElementById('newCommentAuthor').value.trim();
    const content = document.getElementById('newCommentContent').value.trim();
    
    if (!author || !content) {
        alert('Please enter your name and comment');
        return;
    }

    const newComment = {
        id: Date.now(),
        author,
        comment: content,
        created_at: new Date().toISOString()
    };

    const commentsContainer = document.getElementById('commentsContainer');
    const commentElement = document.createElement('div');
    commentElement.classList.add('comment', 'mb-4');
    
    const commentDate = new Date(newComment.created_at);
    commentElement.innerHTML = `
        <div class="comment-header">
            <span class="font-bold">${newComment.author}</span>
            <span class="text-sm text-gray-500">${commentDate.toLocaleString()}</span>
        </div>
        <div class="comment-content">${newComment.comment}</div>
    `;
    
    commentsContainer.prepend(commentElement); // Show new comment at the top
    document.getElementById('newCommentAuthor').value = '';
    document.getElementById('newCommentContent').value = '';
}

// Render events with action buttons
const renderEvents = () => {
    const eventList = document.getElementById('eventList');
    eventList.innerHTML = '';

    if (filteredEvents.length === 0) {
        const emptyItem = document.createElement('li');
        emptyItem.textContent = 'No matching events.';
        eventList.appendChild(emptyItem);
        return;
    }

    filteredEvents.forEach(event => {
        const eventItem = document.createElement('li');
        eventItem.classList.add('event-item', 'p-3', 'bg-gray-50', 'rounded-lg');
        
        const eventDate = new Date(`${event.date}T${event.time}`);
        
        const eventHeader = document.createElement('div');
        eventHeader.classList.add('flex', 'justify-between', 'items-center', 'mb-2');
        
        const eventText = document.createElement('span');
        eventText.classList.add('font-medium');
        eventText.textContent = `${event.title} - ${eventDate.toLocaleString()}`;
        
        // Action buttons
        const actionButtons = document.createElement('div');
        actionButtons.classList.add('action-buttons');
        
        // Details button
        const detailsBtn = document.createElement('button');
        detailsBtn.textContent = 'Details';
        detailsBtn.classList.add('action-btn', 'details-btn');
        detailsBtn.onclick = () => showEventDetails(event);
        
        // Edit button
        const editBtn = document.createElement('button');
        editBtn.textContent = 'Edit';
        editBtn.classList.add('action-btn', 'edit-btn');
        editBtn.onclick = () => openEventFormFromId(event.id);
        
        // Delete button
        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = 'Delete';
        deleteBtn.classList.add('action-btn', 'delete-btn');
        deleteBtn.onclick = () => deleteEvent(event.id);
        
        actionButtons.appendChild(detailsBtn);
        actionButtons.appendChild(editBtn);
        actionButtons.appendChild(deleteBtn);
        
        eventHeader.appendChild(eventText);
        eventHeader.appendChild(actionButtons);
        
        eventItem.appendChild(eventHeader);
        
        eventList.appendChild(eventItem);
    });
};

// Show event details
function showEventDetails(event) {
    const eventDate = new Date(`${event.date}T${event.time}`);
    alert(`Event Details:\n\nTitle: ${event.title}\nDate: ${eventDate.toLocaleString()}\nDescription: ${event.description || 'No description provided'}`);
}

// Save event
const saveEvent = () => {
    const eventNameInput = document.getElementById('eventName');
    const eventDescInput = document.getElementById('eventDescription');
    const eventDateTimeInput = document.getElementById('eventDateTime');
    
    const eventName = eventNameInput.value.trim();
    const eventDesc = eventDescInput.value.trim();
    const eventDateTimeVal = eventDateTimeInput.value;

    if (!eventName) {
        alert('Please enter an event name.');
        return;
    }
    if (!eventDateTimeVal) {
        alert('Please select a date and time for the event.');
        return;
    }

    const datePart = eventDateTimeVal.split('T')[0];
    const timePart = eventDateTimeVal.split('T')[1];

    if (editingEventId !== null) {
        const idx = events.findIndex(e => e.id === editingEventId);
        if (idx !== -1) {
            events[idx].title = eventName;
            events[idx].description = eventDesc;
            events[idx].date = datePart;
            events[idx].time = timePart;
        }
    } else {
        const newId = events.length > 0 ? Math.max(...events.map(e => e.id)) + 1 : 1;
        const newEvent = {
            id: newId,
            title: eventName,
            description: eventDesc,
            date: datePart,
            time: timePart,
            comments: []
        };
        events.push(newEvent);
    }

    editingEventId = null;
    document.getElementById('eventForm').style.display = 'none';
    eventNameInput.value = '';
    eventDescInput.value = '';
    eventDateTimeInput.value = '';
    updateEventList();
};

// Delete event
const deleteEvent = (id) => {
    if (confirm('Are you sure you want to delete this event and all its comments?')) {
        events = events.filter(ev => ev.id !== id);
        updateEventList();
    }
};

// Open event form for editing
const openEventFormFromId = (id) => {
    const event = events.find(ev => ev.id === id);
    if (event) {
        openEventForm(null, null, null, event);
    }
};

// Update event list
const updateEventList = () => {
    const searchTerm = document.getElementById('event-search').value.toLowerCase();
    const sortBy = document.getElementById('sortSelect').value;
    
    filteredEvents = events.filter(event => 
        event.title.toLowerCase().includes(searchTerm) || 
        (event.description && event.description.toLowerCase().includes(searchTerm)))
        .sort((a, b) => {
            const dateA = new Date(`${a.date}T${a.time}`);
            const dateB = new Date(`${b.date}T${b.time}`);
            
            if (sortBy === 'name') {
                return a.title.localeCompare(b.title);
            } else {
                return dateA - dateB;
            }
        });
    
    renderEvents();
};

// Fetch external events from the provided JSON file
async function fetchExternalEvents() {
    try {
        const response = await fetch('https://raw.githubusercontent.com/Ghufran-Shaikh/CS333-CampusClub/refs/heads/Calander-moduel(Phase2)/Calnder-moduel/EventData.json');
        const data = await response.json();
        
        // Transform the data to match our event structure
        const externalEvents = data.map(event => {
            return {
                id: event.id,
                title: event.title,
                description: event.description,
                date: event.date,
                time: event.time,
                isExternal: true
            };
        });
        
        // Add to our events array
        events = [...events, ...externalEvents];
        updateEventList();
    } catch (error) {
        console.error('Error fetching events:', error);
    }
}

// Fetch and display comments from the provided JSON file
async function fetchAndDisplayComments() {
    try {
        const response = await fetch('https://raw.githubusercontent.com/Ghufran-Shaikh/CS333-CampusClub/refs/heads/Calander-moduel(Phase2)/Calnder-moduel/comment.json');
        const data = await response.json();
        
        console.log('Comments data received:', data);
        
        // Transform the data to match our comment structure
        const externalComments = data.map(comment => {
            return {
                id: comment.id,
                author: comment.author || 'Anonymous',
                comment: comment.comment || comment.body || 'No comment content',
                created_at: comment.created_at || new Date().toISOString(),
                // لن نستخدم event_id بما أننا نعرض التعليقات بشكل مستقل
                eventTitle: comment.event_title || 'General Comment' // إضافة عنوان افتراضي للحدث
            };
        });
        
        console.log('Processed comments:', externalComments);
        
        // عرض جميع التعليقات مباشرة دون ربطها بأحداث
        displayAllComments(externalComments);
        
    } catch (error) {
        console.error('Error fetching comments:', error);
    }
}

// دالة جديدة لعرض جميع التعليقات
function displayAllComments(comments) {
    const commentsContainer = document.getElementById('commentsContainer');
    commentsContainer.innerHTML = '';
    
    if (comments.length === 0) {
        commentsContainer.innerHTML = '<p>No comments yet. Be the first to comment!</p>';
        return;
    }
    
    // Sort by date (newest first)
    comments.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    
    // Display all comments
    comments.forEach(comment => {
        const commentElement = document.createElement('div');
        commentElement.classList.add('comment', 'mb-4');
        
        const commentDate = new Date(comment.created_at);
        
        commentElement.innerHTML = `
            <div class="comment-header">
                <span class="font-bold">${comment.author}</span>
                <span class="text-sm text-gray-500">${commentDate.toLocaleString()}</span>
            </div>
            ${comment.eventTitle ? `<div class="text-sm text-gray-600 mb-1">On topic: ${comment.eventTitle}</div>` : ''}
            <div class="comment-content">${comment.comment}</div>
        `;
        
        commentsContainer.appendChild(commentElement);
    });
}

// Update comments section
function updateCommentsSection() {
    const commentsContainer = document.getElementById('commentsContainer');
    commentsContainer.innerHTML = '';
    
    // Collect all comments from all events
    let allComments = [];
    events.forEach(event => {
        if (event.comments && event.comments.length > 0) {
            allComments = allComments.concat(event.comments.map(comment => {
                return {
                    ...comment,
                    eventTitle: event.title
                };
            }));
        }
    });
    
    // Sort by date (newest first)
    allComments.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    
    if (allComments.length === 0) {
        commentsContainer.innerHTML = '<p>No comments yet. Be the first to comment!</p>';
        return;
    }
    
    // Display all comments
    allComments.forEach(comment => {
        const commentElement = document.createElement('div');
        commentElement.classList.add('comment', 'mb-4');
        
        const commentDate = new Date(comment.created_at);
        
        commentElement.innerHTML = `
            <div class="comment-header">
                <span class="font-bold">${comment.author}</span>
                <span class="text-sm text-gray-500">${commentDate.toLocaleString()}</span>
            </div>
            <div class="text-sm text-gray-600 mb-1">On event: ${comment.eventTitle}</div>
            <div class="comment-content">${comment.comment}</div>
        `;
        
        commentsContainer.appendChild(commentElement);
    });
}

// Initialize the page
window.onload = async () => {
    populateSelects();
    const today = new Date();
    document.getElementById('monthSelect').value = today.getMonth();
    document.getElementById('yearSelect').value = today.getFullYear();
    generateCalendar(today.getFullYear(), today.getMonth());

    document.getElementById('saveEventBtn').addEventListener('click', saveEvent);
    document.getElementById('sortSelect').addEventListener('change', updateEventList);
    document.getElementById('event-search').addEventListener('input', updateEventList);

    // Fetch events and comments from the provided URLs
    await fetchExternalEvents();
    await fetchAndDisplayComments();
};
</script>
</body>
</html>
