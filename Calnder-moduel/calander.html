<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/x-icon" href="Calendar-icon.jpeg">

    <style>
        /* Your existing styles */
    </style>
</head>
<body>
<header class="bg-blue-800 fixed top-0 left-0 right-0 z-10 py-4 px-6">
    <nav>
        <ul class="flex space-x-6 justify-center items-center text-white font-bold">
            <li><a href="../index.html" target="_blank" class="hover:text-orange-500">Home</a></li>
            <li><a href="calander.html" target="_blank" class="hover:text-orange-500">Event Calendar</a></li>
            <li><a href="../study-group-finder/study-group-finder.html" target="_blank" class="hover:text-orange-500">Study Group Finder</a></li>
            <li><a href="../CourseReviews/CourseReviews.html" target="_blank" class="hover:text-orange-500">Course Reviews</a></li>
            <li><a href="../Course Notes/CourseNote.html" target="_blank" class="hover:text-orange-500">Course Note</a></li>
            <li><a href="../Club Activites/clubActivites.html" target="_blank" class="hover:text-orange-500">Clubs Activities</a></li>
        </ul>
    </nav>

<main class="flex-grow flex flex-col items-center pt-24 px-4">
    <div class="max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <h1 class="text-4xl font-bold text-blue-800 mb-2">Event Calendar</h1>
            <p class="text-gray-600 mb-4">Choose a date to add an event.</p>

            <div class="flex gap-2 mb-4 flex-wrap">
                <select id="monthSelect" class="border border-gray-300 p-2 rounded flex-1 min-w-[120px]"></select>
                <select id="yearSelect" class="border border-gray-300 p-2 rounded flex-1 min-w-[120px]"></select>
                <button id="generateBtn" class="bg-blue-800 text-white font-bold py-2 px-4 rounded">Generate</button>
            </div>

            <div class="calendar" id="calendar"></div>

            <div id="eventForm" class="event-form mt-4">
                <h3 class="font-bold mb-2">Add Event</h3>
                <label for="eventName">Event Name:</label>
                <input type="text" id="eventName" class="w-full p-2 border border-gray-300 rounded mb-2" />
                <label for="eventDescription">Event Description:</label>
                <textarea id="eventDescription" class="w-full p-2 border border-gray-300 rounded mb-2"></textarea>
                <label for="eventDateTime">Event Date and Time:</label>
                <input type="datetime-local" id="eventDateTime" class="w-full p-2 border border-gray-300 rounded mb-2" />
                <button id="saveEventBtn" class="bg-blue-800 text-white font-bold py-2 px-4 rounded mt-2">Submit</button>
            </div>
        </div>

        <div class="upcoming-events">
            <h2 class="text-2xl font-bold mb-4">Upcoming Events</h2>
            <input type="text" id="event-search" placeholder="🔍 Search for an event..." class="w-full p-2 border border-gray-300 rounded mb-4" oninput="updateEventList()">
            <div class="flex justify-between mb-4">
                <label for="sortSelect" class="font-bold">Sort By:</label>
                <select id="sortSelect" class="border border-gray-300 p-2 rounded" onchange="updateEventList()">
                    <option value="date">Date</option>
                    <option value="name">Name</option>
                </select>
            </div>
            <ul id="eventList" class="space-y-3"></ul>
        </div>
    </div>

    <!-- Comments Section -->
    <div class="comments-section">
        <h2 class="text-2xl font-bold mb-6 text-blue-800">Event Comments</h2>
        <div id="commentsContainer"></div>
        <h3 class="font-bold mt-4">Add a Comment</h3>
        <input type="text" id="newCommentAuthor" placeholder="Your name" class="w-full p-2 mb-2 border rounded">
        <textarea id="newCommentContent" placeholder="Your comment" class="w-full p-2 mb-2 border rounded"></textarea>
        <button onclick="addNewComment()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Add Comment</button>
    </div>
</main>

<footer class="bg-blue-800 text-white py-4 text-center mt-8">
    <div>&copy; 2025 ITCS333 Project</div>
    <div class="flex justify-center gap-4 mt-2">
        <a href="#" class="hover:text-orange-500">Club Policy</a>

        <a href="#" class="hover:text-orange-500">About</a>
        <a href="#" class="hover:text-orange-500">Help</a>
    </div>
</footer>

<script>
const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

let events = [];
let editingEventId = null;

// Generate calendar
const generateCalendar = (year, month) => {
    const calendar = document.getElementById('calendar');
    calendar.innerHTML = '';
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for (let day = 1; day <= daysInMonth; day++) {
        const dayElement = document.createElement('div');
        dayElement.classList.add('day');
        dayElement.textContent = day;

        dayElement.addEventListener('click', () => {
            openEventForm(year, month + 1, day);
        });

        calendar.appendChild(dayElement);
    }
};

// Populate month and year selects
const populateSelects = () => {
    const monthSelect = document.getElementById('monthSelect');
    const yearSelect = document.getElementById('yearSelect');

    months.forEach((month, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.textContent = month;
        monthSelect.appendChild(option);
    });

    const currentYear = new Date().getFullYear();
    for (let i = currentYear; i <= currentYear + 10; i++) {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = i;
        yearSelect.appendChild(option);
    }
};

// Fetch events from the server
const fetchEvents = async () => {
    try {
        const response = await fetch('https://47d4b4e2-bb43-4d33-a107-08c8c1d57aee-00-2s8qb456kkmea.pike.replit.dev/main.php'); // استبدل بـ URL الخاص بك
        if (!response.ok) {
            throw new Error('failed to fetch events');
        }
        events = await response.json();
        renderEvents();
    } catch (error) {
        console.error('error in fetching events:', error);
    }
};

// Render events
const renderEvents = () => {
    const eventList = document.getElementById('eventList');
    eventList.innerHTML = '';

    if (events.length === 0) {
        eventList.innerHTML = '<li> no event</li>';
        return;
    }

    events.forEach(event => {
        const eventItem = document.createElement('li');
        eventItem.classList.add('event-item', 'p-3', 'bg-gray-50', 'rounded-lg');
        eventItem.innerHTML = `
            ${event.title} - ${new Date(event.event_datetime).toLocaleString()}
            <button onclick="showComments(${event.event_id})">show comments </button>
            <div id="comments-${event.event_id}"></div>
        `;
        eventList.appendChild(eventItem);
    });
};

// Show comments for an event
const showComments = async (eventId) => {
    try {
        const response = await fetch(`https://47d4b4e2-bb43-4d33-a107-08c8c1d57aee-00-2s8qb456kkmea.pike.replit.dev/main.php?event_id=${eventId}`);
        const comments = await response.json();
        const commentsDiv = document.getElementById(`comments-${eventId}`);
        commentsDiv.innerHTML = '';

        comments.forEach(comment => {
            const commentElement = document.createElement('div');
            commentElement.classList.add('comment');
            commentElement.innerHTML = `<p>${comment.comment}</p>`;
            commentsDiv.appendChild(commentElement);
        });
    } catch (error) {
        console.error('error fetching comments:', error);
    }
};

// Add new comment
const addNewComment = async () => {
    const author = document.getElementById('newCommentAuthor').value.trim();
    const content = document.getElementById('newCommentContent').value.trim();


    if (!author || !content) {
        alert('Enter your name and comment.');
        return;
    }

    try {
        const response = await fetch('https://47d4b4e2-bb43-4d33-a107-08c8c1d57aee-00-2s8qb456kkmea.pike.replit.dev/main.php', {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                event_id: eventId,
                comment: content
            })
        });

        const result = await response.json();
        if (result.success) {
            showComments(eventId); 
            document.getElementById('newCommentAuthor').value = '';
            document.getElementById('newCommentContent').value = '';
        } else {
            console.error(result.error);
        }
    } catch (error) {
        console.error('error in adding comment', error);
    }
};

// Initialize the page
window.onload = async () => {
    populateSelects();
    const today = new Date();
    document.getElementById('monthSelect').value = today.getMonth();
    document.getElementById('yearSelect').value = today.getFullYear();
    generateCalendar(today.getFullYear(), today.getMonth());
    await fetchEvents();
};
</script>
</body>
</html>
